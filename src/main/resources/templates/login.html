<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Đăng nhập - Hệ thống quản lý chuỗi cửa hàng tiện lợi')}"></head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Convenient Store</h1>
                <p class="auth-subtitle">Hệ thống quản lý chuỗi cửa hàng tiện lợi</p>
            </div>

            <!-- Error Notification from controller advice -->
            <div th:if="${error}" class="alert alert-danger text-center" role="alert" id="error-alert">
                <span th:text="${error}">Thông tin đăng nhập không chính xác</span>
            </div>

            <!-- Success Notification for Logout -->
            <div th:if="${param.logout}" class="alert alert-success text-center" role="alert">
                <span>Bạn đã đăng xuất thành công!</span>
            </div>

            <!-- Success Notification for Password Changed -->
            <div th:if="${param.passwordChanged}" class="alert alert-success text-center" role="alert">
                <span>Đổi mật khẩu thành công!</span>
            </div>

            <!-- Session Expired Notification -->
            <div th:if="${param.expired}" class="alert alert-danger text-center" role="alert">
                <span>Phiên đăng nhập của bạn đã hết hạn hoặc tài khoản được đăng nhập từ một thiết bị khác.</span>
            </div>

            <form th:action="@{/login}" th:object="${loginRequest}" method="post">
                <!-- CSRF Token auto-inserted by thymeleaf -->
                <div class="mb-4">
                    <label for="username" class="form-label">Tên đăng nhập</label>
                    <input type="text" class="form-control" id="username" th:field="*{username}" autocomplete="username" placeholder="Nhập tên đăng nhập...">
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control" id="password" th:field="*{password}" autocomplete="current-password" placeholder="Nhập mật khẩu...">
                </div>

                <button type="submit" class="btn btn-primary">Đăng nhập</button>
            </form>

            <div class="auth-footer">
                <a th:href="@{/forgot-password}">Quên mật khẩu?</a>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
