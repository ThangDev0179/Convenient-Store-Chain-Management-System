<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Chi Tiết Chuyển Kho')}"></head>
<body>
<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar('transfer')}"></nav>
    <div th:replace="~{fragments/layout :: overlay}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Chi Tiết Chuyển Kho')}"></div>
        <div class="page-content">

            <div class="dashboard-header d-flex justify-content-between align-items-center mb-3">
                <h2 class="page-heading"><i class="fa-solid fa-arrow-right-arrow-left me-2"></i> Chi tiết Phiếu Điều Chuyển</h2>
                <a href="/transfer" class="btn btn-secondary">
                    <i class="fa-solid fa-arrow-left me-1"></i> Quay lại
                </a>
            </div>

            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Thông tin chung -->
            <div class="card-glass mb-4">
                <div class="card-header-glass fw-bold">Thông tin phiếu</div>
                <div class="card-body-glass row g-3">
                    <div class="col-md-3"><strong>Mã phiếu:</strong> <span th:text="${transfer.transferCode}"></span></div>
                    <div class="col-md-3"><strong>CN gửi:</strong> <span th:text="${transfer.fromBranch.branchName}"></span></div>
                    <div class="col-md-3"><strong>CN nhận:</strong> <span th:text="${transfer.toBranch.branchName}"></span></div>
                    <div class="col-md-3">
                        <strong>Trạng thái: </strong>
                        <span th:class="${'badge-status ' + 
                            (transfer.status.name() == 'Draft' ? 'status-secondary' : 
                            (transfer.status.name() == 'In_Transit' ? 'status-warning' : 
                            (transfer.status.name() == 'Completed' ? 'status-success' : 'status-danger')))}"
                              th:text="${transfer.status}">
                        </span>
                    </div>
                    <div class="col-md-4"><strong>Người tạo:</strong> <span th:text="${transfer.createdBy.fullName}"></span></div>
                    <div class="col-md-4"><strong>Ngày tạo:</strong> <span th:text="${#temporals.format(transfer.createdAt, 'dd/MM/yyyy HH:mm')}"></span></div>
                    <div class="col-md-4" th:if="${transfer.receivedAt != null}">
                        <strong>Ngày nhận:</strong> <span th:text="${#temporals.format(transfer.receivedAt, 'dd/MM/yyyy HH:mm')}"></span>
                    </div>
                </div>
            </div>

            <!-- Hành động -->
            <div class="mb-4 d-flex gap-2">
                <!-- Approve: chỉ MANAGER/ADMIN, chỉ khi Draft -->
                <form th:if="${transfer.status.name() == 'Draft'}"
                      th:action="@{/transfer/{id}/approve(id=${transfer.stockTransferId})}" method="post"
                      sec:authorize="hasAnyRole('MANAGER','ADMIN')">
                    <button type="submit" class="btn btn-warning"
                            onclick="return confirm('Phê duyệt và bắt đầu vận chuyển?')">
                        <i class="fa-solid fa-check-circle me-1"></i> Phê duyệt
                    </button>
                </form>
                <!-- Reject: chỉ MANAGER/ADMIN, chỉ khi Draft -->
                <form th:if="${transfer.status.name() == 'Draft'}"
                      th:action="@{/transfer/{id}/reject(id=${transfer.stockTransferId})}" method="post"
                      sec:authorize="hasAnyRole('MANAGER','ADMIN')">
                    <button type="submit" class="btn btn-danger"
                            onclick="return confirm('Từ chối phiếu điều chuyển này?')">
                        <i class="fa-solid fa-xmark-circle me-1"></i> Từ chối
                    </button>
                </form>
            </div>

            <!-- Danh sách sản phẩm -->
            <div class="card-glass mb-4">
                <div class="card-header-glass fw-bold">Danh sách sản phẩm</div>
                <div class="table-responsive">
                    <table class="table-glass w-100 mb-0">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Sản phẩm (ID)</th>
                                <th>SL Gửi</th>
                                <th>SL Nhận thực tế</th>
                                <th>Hao hụt</th>
                                <th th:if="${transfer.status.name() == 'In_Transit'}">Nhập SL nhận</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="detail, stat : ${transfer.details}">
                                <td th:text="${stat.index + 1}"></td>
                                <td th:text="${detail.product.productId}"></td>
                                <td th:text="${detail.quantitySent}"></td>
                                <td th:text="${detail.quantityReceived != null ? detail.quantityReceived : '-'}"></td>
                                <td>
                                    <span th:if="${detail.quantityReceived != null}"
                                          th:text="${detail.quantitySent.subtract(detail.quantityReceived)}"
                                          th:class="${detail.quantitySent.subtract(detail.quantityReceived).compareTo(T(java.math.BigDecimal).ZERO) gt 0} ? 'text-danger fw-bold' : 'text-success'">
                                    </span>
                                    <span th:if="${detail.quantityReceived == null}">-</span>
                                </td>
                                <!-- Cột nhập số lượng nhận (chỉ hiện khi In_Transit) -->
                                <td th:if="${transfer.status.name() == 'In_Transit'}">
                                    <input type="number"
                                           th:name="'details[' + ${stat.index} + '].quantityReceived'"
                                           step="0.001" min="0" class="form-control form-control-sm"
                                           style="width: 120px;"
                                           th:value="${detail.quantitySent}"
                                           form="receiveForm"/>
                                    <input type="hidden"
                                           th:name="'details[' + ${stat.index} + '].transferDetailId'"
                                           th:value="${detail.transferDetailId}"
                                           form="receiveForm"/>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Form xác nhận nhận hàng (chỉ khi In_Transit) -->
            <div th:if="${transfer.status.name() == 'In_Transit'}">
                <form id="receiveForm" th:action="@{/transfer/{id}/receive(id=${transfer.stockTransferId})}" method="post">
                    <button type="submit" class="btn btn-success"
                            onclick="return confirm('Xác nhận đã nhận hàng? Tồn kho sẽ được cập nhật ngay.')">
                        <i class="fa-solid fa-box-open me-1"></i> Xác nhận Nhận hàng
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
