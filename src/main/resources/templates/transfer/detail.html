<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Chi tiết Phiếu Điều Chuyển</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-arrow-left-right me-2"></i>Chi tiết Phiếu Điều Chuyển</h2>
        <a href="/transfer" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i> Quay lại
        </a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" th:text="${successMessage}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" th:text="${errorMessage}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Thông tin chung -->
    <div class="card mb-3 shadow-sm">
        <div class="card-header fw-bold">Thông tin phiếu</div>
        <div class="card-body row g-2">
            <div class="col-md-3"><strong>Mã phiếu:</strong> <span th:text="${transfer.transferCode}"></span></div>
            <div class="col-md-3"><strong>CN gửi:</strong> <span th:text="${transfer.fromBranch.branchName}"></span></div>
            <div class="col-md-3"><strong>CN nhận:</strong> <span th:text="${transfer.toBranch.branchName}"></span></div>
            <div class="col-md-3">
                <strong>Trạng thái: </strong>
                <span th:class="${'badge ' + 
                    (transfer.status.name() == 'Draft' ? 'bg-secondary' : 
                    (transfer.status.name() == 'In_Transit' ? 'bg-warning text-dark' : 
                    (transfer.status.name() == 'Completed' ? 'bg-success' : 'bg-danger')))}"
                      th:text="${transfer.status}">
                </span>
            </div>
            <div class="col-md-4"><strong>Người tạo:</strong> <span th:text="${transfer.createdBy.fullName}"></span></div>
            <div class="col-md-4"><strong>Ngày tạo:</strong> <span th:text="${#temporals.format(transfer.createdAt, 'dd/MM/yyyy HH:mm')}"></span></div>
            <div class="col-md-4" th:if="${transfer.receivedAt != null}">
                <strong>Ngày nhận:</strong> <span th:text="${#temporals.format(transfer.receivedAt, 'dd/MM/yyyy HH:mm')}"></span>
            </div>
        </div>
    </div>

    <!-- Hành động -->
    <div class="mb-3 d-flex gap-2">
        <!-- Approve: chỉ MANAGER/ADMIN, chỉ khi Draft -->
        <form th:if="${transfer.status.name() == 'Draft'}"
              th:action="@{/transfer/{id}/approve(id=${transfer.stockTransferId})}" method="post"
              sec:authorize="hasAnyRole('MANAGER','ADMIN')">
            <button type="submit" class="btn btn-warning"
                    onclick="return confirm('Phê duyệt và bắt đầu vận chuyển?')">
                <i class="bi bi-check-circle me-1"></i>Phê duyệt
            </button>
        </form>
        <!-- Reject: chỉ MANAGER/ADMIN, chỉ khi Draft -->
        <form th:if="${transfer.status.name() == 'Draft'}"
              th:action="@{/transfer/{id}/reject(id=${transfer.stockTransferId})}" method="post"
              sec:authorize="hasAnyRole('MANAGER','ADMIN')">
            <button type="submit" class="btn btn-danger"
                    onclick="return confirm('Từ chối phiếu điều chuyển này?')">
                <i class="bi bi-x-circle me-1"></i>Từ chối
            </button>
        </form>
    </div>

    <!-- Danh sách sản phẩm -->
    <div class="card mb-3 shadow-sm">
        <div class="card-header fw-bold">Danh sách sản phẩm</div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Sản phẩm (ID)</th>
                        <th>SL Gửi</th>
                        <th>SL Nhận thực tế</th>
                        <th>Hao hụt</th>
                        <th th:if="${transfer.status.name() == 'In_Transit'}">Nhập SL nhận</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="detail, stat : ${transfer.details}">
                        <td th:text="${stat.index + 1}"></td>
                        <td th:text="${detail.product.productId}"></td>
                        <td th:text="${detail.quantitySent.stripTrailingZeros().toPlainString()}"></td>
                        <td th:text="${detail.quantityReceived != null ? detail.quantityReceived.stripTrailingZeros().toPlainString() : '-'}"></td>
                        <td>
                            <span th:if="${detail.quantityReceived != null && detail.quantitySent.compareTo(detail.quantityReceived) > 0}"
                                  th:text="${detail.quantitySent.subtract(detail.quantityReceived).stripTrailingZeros().toPlainString()}"
                                  class="text-danger fw-bold">
                            </span>
                            <span th:if="${detail.quantityReceived != null && detail.quantitySent.compareTo(detail.quantityReceived) <= 0}"
                                  th:text="0" class="text-success">
                            </span>
                            <span th:if="${detail.quantityReceived == null}">-</span>
                        </td>
                        <!-- Cột nhập số lượng nhận (chỉ hiện khi In_Transit) -->
                        <td th:if="${transfer.status.name() == 'In_Transit'}">
                            <input type="number"
                                   th:name="'details[' + ${stat.index} + '].quantityReceived'"
                                   step="0.001" min="0" class="form-control form-control-sm"
                                   style="width: 120px;"
                                   th:value="${detail.quantitySent}"
                                   form="receiveForm"/>
                            <input type="hidden"
                                   th:name="'details[' + ${stat.index} + '].transferDetailId'"
                                   th:value="${detail.transferDetailId}"
                                   form="receiveForm"/>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Form xác nhận nhận hàng (chỉ khi In_Transit) -->
    <div th:if="${transfer.status.name() == 'In_Transit'}">
        <form id="receiveForm" th:action="@{/transfer/{id}/receive(id=${transfer.stockTransferId})}" method="post">
            <button type="submit" class="btn btn-success"
                    onclick="return confirm('Xác nhận đã nhận hàng? Tồn kho sẽ được cập nhật ngay.')">
                <i class="bi bi-box-seam me-1"></i>Xác nhận Nhận hàng
            </button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
