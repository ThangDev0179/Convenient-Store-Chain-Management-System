<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Tạo Phiếu Chuyển Kho')}"></head>
<body>
<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar('transfer')}"></nav>
    <div th:replace="~{fragments/layout :: overlay}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Tạo Phiếu Chuyển Kho')}"></div>
        <div class="page-content">

            <div class="dashboard-header mb-4">
                <h2 class="page-heading"><i class="fa-solid fa-plus-circle me-2"></i> Tạo Phiếu Điều Chuyển Kho</h2>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/transfer/create}" th:object="${request}" method="post" id="transferForm">
                <div class="card-glass mb-4">
                    <div class="card-header-glass fw-bold">Thông tin chung</div>
                    <div class="card-body-glass row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Chi nhánh gửi <span class="text-danger">*</span></label>
                            <input type="number" th:field="*{fromBranchId}" class="form-control"
                                   th:classappend="${#fields.hasErrors('fromBranchId')} ? 'is-invalid'" placeholder="ID chi nhánh gửi"/>
                            <div class="invalid-feedback" th:errors="*{fromBranchId}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Chi nhánh nhận <span class="text-danger">*</span></label>
                            <input type="number" th:field="*{toBranchId}" class="form-control"
                                   th:classappend="${#fields.hasErrors('toBranchId')} ? 'is-invalid'" placeholder="ID chi nhánh nhận"/>
                            <div class="invalid-feedback" th:errors="*{toBranchId}"></div>
                        </div>
                    </div>
                </div>

                <div class="card-glass mb-4">
                    <div class="card-header-glass fw-bold d-flex justify-content-between align-items-center">
                        Danh sách sản phẩm điều chuyển
                        <button type="button" class="btn btn-sm btn-outline-primary" onclick="addRow()">
                            <i class="fa-solid fa-plus"></i> Thêm sản phẩm
                        </button>
                    </div>
                    <div class="table-responsive">
                        <table class="table-glass w-100 mb-0" id="detailTable">
                            <thead>
                                <tr>
                                    <th>Product ID</th>
                                    <th>Số lượng gửi</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="detailBody">
                                <tr>
                                    <td><input type="number" name="details[0].productId" class="form-control" placeholder="ID sản phẩm" required/></td>
                                    <td><input type="number" name="details[0].quantitySent" step="0.001" class="form-control" placeholder="Số lượng" required/></td>
                                    <td><button type="button" class="btn btn-sm btn-danger" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save me-1"></i>Lưu phiếu</button>
                    <a href="/transfer" class="btn btn-secondary">Hủy</a>
                </div>
            </form>

        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    let rowIndex = 1;
    function addRow() {
        const tbody = document.getElementById('detailBody');
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><input type="number" name="details[${rowIndex}].productId" class="form-control" placeholder="ID sản phẩm" required/></td>
            <td><input type="number" name="details[${rowIndex}].quantitySent" step="0.001" class="form-control" placeholder="Số lượng" required/></td>
            <td><button type="button" class="btn btn-sm btn-danger" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button></td>
        `;
        tbody.appendChild(row);
        rowIndex++;
    }
    function removeRow(btn) {
        const row = btn.closest('tr');
        const tbody = document.getElementById('detailBody');
        if (tbody.rows.length > 1) row.remove();
    }
</script>
</body>
</html>
