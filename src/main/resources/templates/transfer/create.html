<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Tạo Phiếu Chuyển Kho')}"></head>
<body>
<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar('transfer')}"></nav>
    <div th:replace="~{fragments/layout :: overlay}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Tạo Phiếu Chuyển Kho')}"></div>
        <div class="page-content">

            <div class="dashboard-header mb-4">
                <h2 class="page-heading"><i class="fa-solid fa-plus-circle me-2"></i> Tạo Phiếu Điều Chuyển Kho</h2>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/transfer/create}" th:object="${request}" method="post" id="transferForm">
                <div class="card-glass mb-4">
                    <div class="card-header-glass fw-bold">Thông tin chung</div>
                    <div class="card-body-glass row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Chi nhánh gửi</label>
                            <div sec:authorize="hasRole('ADMIN')">
                                <select th:field="*{fromBranchId}" class="form-select"
                                        th:classappend="${#fields.hasErrors('fromBranchId')} ? 'is-invalid'" required>
                                    <option value="">-- Chọn chi nhánh gửi --</option>
                                    <option th:each="b : ${branches}"
                                            th:value="${b.branchId}"
                                            th:text="${b.branchCode + ' - ' + b.branchName}"></option>
                                </select>
                                <div class="invalid-feedback" th:errors="*{fromBranchId}"></div>
                            </div>
                            <div sec:authorize="!hasRole('ADMIN')">
                                <input type="hidden" th:field="*{fromBranchId}"/>
                                <div class="form-control-plaintext fw-bold text-primary fs-6">
                                    <i class="fa-solid fa-store me-1"></i>
                                    <span th:text="${#authentication.principal.employee.branch != null ? #authentication.principal.employee.branch.branchCode + ' - ' + #authentication.principal.employee.branch.branchName : 'Chi nhánh chính'}"></span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Chi nhánh nhận <span class="text-danger">*</span></label>
                            <select th:field="*{toBranchId}" class="form-select"
                                    th:classappend="${#fields.hasErrors('toBranchId')} ? 'is-invalid'" required>
                                <option value="">-- Chọn chi nhánh nhận --</option>
                                <option th:each="b : ${branches}"
                                        th:value="${b.branchId}"
                                        th:text="${b.branchCode + ' - ' + b.branchName}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{toBranchId}"></div>
                        </div>
                    </div>
                </div>

                <div class="card-glass mb-4">
                    <div class="card-header-glass fw-bold d-flex justify-content-between align-items-center">
                        Danh sách sản phẩm điều chuyển
                        <button type="button" class="btn btn-sm btn-outline-primary" onclick="addRow()">
                            <i class="fa-solid fa-plus"></i> Thêm sản phẩm
                        </button>
                    </div>
                    <div class="table-responsive">
                        <table class="table-glass w-100 mb-0" id="detailTable">
                            <thead>
                                <tr>
                                    <th style="min-width: 250px;">Sản phẩm</th>
                                    <th style="width: 150px;">Số lượng gửi</th>
                                    <th style="width: 50px;"></th>
                                </tr>
                            </thead>
                            <tbody id="detailBody">
                                <tr>
                                    <td>
                                        <select name="details[0].productId" class="form-select product-select" required>
                                            <option value="">-- Chọn sản phẩm --</option>
                                            <option th:each="p : ${products}"
                                                    th:value="${p.productId}"
                                                    th:text="${p.sku + ' - ' + p.productName}"></option>
                                        </select>
                                    </td>
                                    <td><input type="number" name="details[0].quantitySent" step="0.001" min="0.001" class="form-control" placeholder="Số lượng" required/></td>
                                    <td><button type="button" class="btn btn-sm btn-danger" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save me-1"></i>Lưu phiếu</button>
                    <a href="/transfer" class="btn btn-secondary">Hủy</a>
                </div>
            </form>

        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:inline="javascript">
/*<![CDATA[*/
    const productsOptions = /*[[${products}]]*/ [];
    let rowIndex = 1;

    function buildProductSelectOptions() {
        if (!productsOptions || productsOptions.length === 0) return '<option value="">-- Chọn sản phẩm --</option>';
        let html = '<option value="">-- Chọn sản phẩm --</option>';
        productsOptions.forEach(p => {
            html += `<option value="${p.productId}">${p.sku} - ${p.productName}</option>`;
        });
        return html;
    }

    function addRow() {
        const tbody = document.getElementById('detailBody');
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>
                <select name="details[${rowIndex}].productId" class="form-select product-select" required>
                    ${buildProductSelectOptions()}
                </select>
            </td>
            <td><input type="number" name="details[${rowIndex}].quantitySent" step="0.001" min="0.001" class="form-control" placeholder="Số lượng" required/></td>
            <td><button type="button" class="btn btn-sm btn-danger" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button></td>
        `;
        tbody.appendChild(row);
        rowIndex++;
    }

    function removeRow(btn) {
        const row = btn.closest('tr');
        const tbody = document.getElementById('detailBody');
        if (tbody.rows.length > 1) row.remove();
    }
/*]]>*/
</script>
</body>
</html>
