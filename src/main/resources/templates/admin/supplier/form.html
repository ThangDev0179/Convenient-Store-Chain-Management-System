<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit ? 'Chỉnh sửa nhà cung cấp' : 'Thêm mới nhà cung cấp'} + ' - Hệ thống bán lẻ'">Form nhà cung cấp</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .auth-body-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 0;
        }
    </style>
</head>
<body class="auth-body-container">
    <div class="auth-wrapper" style="max-width: 650px;">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title" th:text="${isEdit ? 'Chỉnh sửa nhà cung cấp' : 'Thêm nhà cung cấp mới'}">Thêm nhà cung cấp</h1>
                <p class="auth-subtitle" th:text="${isEdit ? 'Cập nhật thông tin chi tiết của nhà cung cấp' : 'Nhập thông tin để tạo mới nhà cung cấp trong hệ thống'}">Mô tả</p>
            </div>

            <!-- General error message alert -->
            <div th:if="${error}" class="alert alert-danger text-center" role="alert">
                <span th:text="${error}">Dữ liệu nhập vào không hợp lệ</span>
            </div>

            <form th:action="${isEdit} ? @{/admin/suppliers/edit/{id}(id=${supplierId})} : @{/admin/suppliers/create}" 
                  th:object="${supplier}" 
                  method="post">
                
                <!-- Supplier ID (disabled read-only view on Edit mode) -->
                <div th:if="${isEdit}" class="mb-3">
                    <label class="form-label text-muted">Mã nhà cung cấp</label>
                    <input type="text" class="form-control" th:value="${'NCC-' + supplierId}" disabled>
                </div>

                <!-- Supplier Name -->
                <div class="mb-3">
                    <label for="supplierName" class="form-label">Tên nhà cung cấp <span class="text-danger">*</span></label>
                    <input type="text" 
                           class="form-control" 
                           id="supplierName" 
                           th:field="*{supplierName}" 
                           th:classappend="${#fields.hasErrors('supplierName')} ? 'is-invalid' : ''" 
                           placeholder="Nhập tên nhà cung cấp..." 
                           required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('supplierName')}" th:errors="*{supplierName}">Tên không hợp lệ</div>
                </div>

                <!-- Contact Phone -->
                <div class="mb-3">
                    <label for="contactPhone" class="form-label">Số điện thoại liên hệ</label>
                    <input type="text" 
                           class="form-control" 
                           id="contactPhone" 
                           th:field="*{contactPhone}" 
                           th:classappend="${#fields.hasErrors('contactPhone')} ? 'is-invalid' : ''" 
                           placeholder="Ví dụ: 0901234567 hoặc +84901234567...">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('contactPhone')}" th:errors="*{contactPhone}">Số điện thoại không hợp lệ</div>
                </div>

                <!-- Contact Email -->
                <div class="mb-3">
                    <label for="contactEmail" class="form-label">Email liên hệ</label>
                    <input type="email" 
                           class="form-control" 
                           id="contactEmail" 
                           th:field="*{contactEmail}" 
                           th:classappend="${#fields.hasErrors('contactEmail')} ? 'is-invalid' : ''" 
                           placeholder="example@supplier.com">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('contactEmail')}" th:errors="*{contactEmail}">Email không hợp lệ</div>
                </div>

                <!-- Address -->
                <div class="mb-4">
                    <label for="address" class="form-label">Địa chỉ</label>
                    <textarea class="form-control" 
                              id="address" 
                              th:field="*{address}" 
                              rows="3" 
                              placeholder="Nhập địa chỉ nhà cung cấp..."></textarea>
                </div>

                <!-- Submit and Cancel Buttons -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-50" th:text="${isEdit ? 'Lưu thay đổi' : 'Thêm nhà cung cấp'}">Xác nhận</button>
                    <a th:href="@{/admin/suppliers}" class="btn btn-secondary w-50 d-flex align-items-center justify-content-center" style="margin-top: 15px;">Hủy bỏ</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
