<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết nhà cung cấp - Hệ thống bán lẻ</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .detail-card {
            background: rgba(17, 24, 39, 0.55);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(16px);
            color: var(--text-primary);
        }
        .detail-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 0;
        }
        .detail-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .detail-value {
            font-weight: 600;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; padding: 40px 0;">
    <div class="container" style="max-width: 800px;">
        <div class="detail-card">
            <div class="mb-4">
                <h1 class="h3 font-weight-bold" style="background: linear-gradient(to right, #a5b4fc, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    CHI TIẾT NHÀ CUNG CẤP
                </h1>
                <p class="text-muted mb-0">Xem thông tin chi tiết đầy đủ của nhà cung cấp và nhật ký kiểm soát</p>
            </div>

            <div class="row">
                <div class="col-md-4 detail-item">
                    <div class="detail-label">Mã nhà cung cấp</div>
                    <div class="detail-value text-info fs-5" th:text="${'NCC-' + supplier.supplierId}">NCC-1</div>
                </div>
                <div class="col-md-8 detail-item">
                    <div class="detail-label">Tên nhà cung cấp</div>
                    <div class="detail-value fs-5" th:text="${supplier.supplierName}">Tên NCC</div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 detail-item">
                    <div class="detail-label">Số điện thoại</div>
                    <div class="detail-value" th:text="${supplier.contactPhone != null ? supplier.contactPhone : 'N/A'}">0912345678</div>
                </div>
                <div class="col-md-4 detail-item">
                    <div class="detail-label">Email liên hệ</div>
                    <div class="detail-value" th:text="${supplier.contactEmail != null ? supplier.contactEmail : 'N/A'}">email@example.com</div>
                </div>
                <div class="col-md-4 detail-item">
                    <div class="detail-label">Trạng thái</div>
                    <div class="mt-1">
                        <span th:if="${supplier.status.name() == 'Active'}" class="badge bg-success px-3 py-2 fs-6">Hoạt động</span>
                        <span th:if="${supplier.status.name() == 'Inactive'}" class="badge bg-danger px-3 py-2 fs-6">Ngưng hoạt động</span>
                    </div>
                </div>
            </div>

            <div class="detail-item">
                <div class="detail-label">Địa chỉ</div>
                <div class="detail-value" th:text="${supplier.address != null ? supplier.address : 'N/A'}">Địa chỉ</div>
            </div>

            <div class="row">
                <div class="col-12 detail-item">
                    <div class="detail-label">Thời gian tạo</div>
                    <div class="detail-value" th:text="${supplier.createdAt != null ? #temporals.format(supplier.createdAt, 'dd/MM/yyyy HH:mm:ss') : 'N/A'}">N/A</div>
                </div>
            </div>

            <div class="mt-4">
                <a th:href="@{/admin/suppliers}" class="btn btn-secondary w-100">Quay lại danh sách</a>
            </div>
        </div>
    </div>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
