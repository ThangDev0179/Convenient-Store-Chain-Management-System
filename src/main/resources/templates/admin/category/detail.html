<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Chi tiết danh mục ngành hàng')}"></head>
<body>
<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar('categories')}"></nav>
    <div th:replace="~{fragments/layout :: overlay}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Chi tiết danh mục ngành hàng')}"></div>
        <div class="page-content">
            <style>
                .detail-card-custom {
                    background: var(--bg-card);
                    border: 1px solid var(--border-subtle);
                    border-radius: var(--radius-lg);
                    padding: 28px;
                    color: var(--text-primary);
                }
                .detail-item {
                    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                    padding: 15px 0;
                }
                .detail-label {
                    color: var(--text-secondary);
                    font-size: 0.85rem;
                    text-transform: uppercase;
                    letter-spacing: 0.05em;
                }
                .detail-value {
                    font-weight: 600;
                    color: var(--text-primary);
                }
            </style>

            <div class="dashboard-header">
                <div>
                    <h1 class="page-heading">
                        CHI TIẾT DANH MỤC NGÀNH HÀNG
                    </h1>
                    <small class="text-muted">Xem thông tin chi tiết đầy đủ của ngành hàng và nhật ký kiểm soát</small>
                </div>
                <div>
                    <a th:href="@{/admin/categories}" class="btn btn-secondary">Quay lại danh sách</a>
                </div>
            </div>

            <div class="detail-card-custom">
                <div class="detail-item">
                    <div class="detail-label">ID Danh mục</div>
                    <div class="detail-value text-info fs-5" th:text="${'CAT-' + category.categoryId}">CAT-1</div>
                </div>

                <div class="detail-item">
                    <div class="detail-label">Tên ngành hàng</div>
                    <div class="detail-value fs-5" th:text="${category.categoryName}">Đồ uống</div>
                </div>

                <div class="detail-item">
                    <div class="detail-label">Mã ngành hàng (SkuPrefix)</div>
                    <div class="mt-1">
                        <span class="badge bg-secondary px-3 py-2 text-uppercase font-weight-bold" style="background: rgba(99, 102, 241, 0.15) !important; color: #a5b4fc; border: 1px solid rgba(99, 102, 241, 0.3);" th:text="${category.skuPrefix}">DU</span>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 detail-item">
                        <div class="detail-label">Người tạo</div>
                        <div class="detail-value" th:text="${category.createdBy != null ? category.createdBy : 'Hệ thống'}">system</div>
                    </div>
                    <div class="col-md-6 detail-item">
                        <div class="detail-label">Thời gian tạo</div>
                        <div class="detail-value" th:text="${category.createdAt != null ? #temporals.format(category.createdAt, 'dd/MM/yyyy HH:mm:ss') : 'N/A'}">N/A</div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 detail-item">
                        <div class="detail-label">Người cập nhật cuối</div>
                        <div class="detail-value" th:text="${category.updatedBy != null ? category.updatedBy : 'Chưa cập nhật'}">N/A</div>
                    </div>
                    <div class="col-md-6 detail-item">
                        <div class="detail-label">Thời gian cập nhật</div>
                        <div class="detail-value" th:text="${category.updatedAt != null ? #temporals.format(category.updatedAt, 'dd/MM/yyyy HH:mm:ss') : 'N/A'}">N/A</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
