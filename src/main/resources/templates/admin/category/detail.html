<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết ngành hàng - Hệ thống bán lẻ</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .detail-card {
            background: rgba(17, 24, 39, 0.55);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(16px);
            color: var(--text-primary);
        }
        .detail-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 0;
        }
        .detail-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .detail-value {
            font-weight: 600;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; padding: 40px 0;">
    <div class="container" style="max-width: 700px;">
        <div class="detail-card">
            <div class="mb-4">
                <h1 class="h3 font-weight-bold" style="background: linear-gradient(to right, #a5b4fc, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    CHI TIẾT DANH MỤC NGÀNH HÀNG
                </h1>
                <p class="text-muted mb-0">Xem thông tin chi tiết đầy đủ của ngành hàng và nhật ký kiểm soát</p>
            </div>

            <div class="detail-item">
                <div class="detail-label">ID Danh mục</div>
                <div class="detail-value text-info fs-5" th:text="${'CAT-' + category.categoryId}">CAT-1</div>
            </div>

            <div class="detail-item">
                <div class="detail-label">Tên ngành hàng</div>
                <div class="detail-value fs-5" th:text="${category.categoryName}">Đồ uống</div>
            </div>

            <div class="detail-item">
                <div class="detail-label">Mã ngành hàng (SkuPrefix)</div>
                <div class="mt-1">
                    <span class="badge bg-primary px-3 py-2 text-uppercase fs-6" style="background: rgba(99, 102, 241, 0.15) !important; color: #a5b4fc; border: 1px solid rgba(99, 102, 241, 0.3);" th:text="${category.skuPrefix}">DU</span>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 detail-item">
                    <div class="detail-label">Người tạo</div>
                    <div class="detail-value" th:text="${category.createdBy != null ? category.createdBy : 'Hệ thống'}">system</div>
                </div>
                <div class="col-md-6 detail-item">
                    <div class="detail-label">Thời gian tạo</div>
                    <div class="detail-value" th:text="${category.createdAt != null ? #temporals.format(category.createdAt, 'dd/MM/yyyy HH:mm:ss') : 'N/A'}">N/A</div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 detail-item">
                    <div class="detail-label">Người cập nhật cuối</div>
                    <div class="detail-value" th:text="${category.updatedBy != null ? category.updatedBy : 'Chưa cập nhật'}">N/A</div>
                </div>
                <div class="col-md-6 detail-item">
                    <div class="detail-label">Thời gian cập nhật</div>
                    <div class="detail-value" th:text="${category.updatedAt != null ? #temporals.format(category.updatedAt, 'dd/MM/yyyy HH:mm:ss') : 'N/A'}">N/A</div>
                </div>
            </div>

            <div class="mt-4">
                <a th:href="@{/admin/categories}" class="btn btn-secondary w-100">Quay lại danh sách</a>
            </div>
        </div>
    </div>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
