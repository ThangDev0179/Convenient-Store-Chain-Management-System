<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - Hệ thống bán lẻ</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .detail-card {
            background: rgba(17, 24, 39, 0.55);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(16px);
            color: var(--text-primary);
        }
        .detail-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 0;
        }
        .detail-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .detail-value {
            font-weight: 600;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; padding: 40px 0;">
    <div class="container" style="max-width: 800px;">
        <div class="detail-card">
            <div class="mb-4 d-flex justify-content-between align-items-start">
                <div>
                    <h1 class="h3 font-weight-bold mb-1" style="background: linear-gradient(to right, #a5b4fc, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                        CHI TIẾT SẢN PHẨM
                    </h1>
                    <p class="text-muted mb-0">Xem thông tin sản phẩm gốc và nhật ký vận hành</p>
                </div>
                <div>
                    <span th:if="${product.status.name() == 'Active'}" class="badge bg-success px-3 py-2 fs-6">Đang bán</span>
                    <span th:if="${product.status.name() == 'Inactive'}" class="badge bg-danger px-3 py-2 fs-6">Ngừng bán</span>
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    <div class="row">
                        <div class="col-md-6 detail-item">
                            <div class="detail-label">Mã SKU</div>
                            <div class="detail-value text-info fs-5" th:text="${product.sku}">SKU-0001</div>
                        </div>

                    </div>

                    <div class="detail-item">
                        <div class="detail-label">Tên sản phẩm</div>
                        <div class="detail-value fs-4" th:text="${product.productName}">Tên sản phẩm</div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 detail-item">
                            <div class="detail-label">Danh mục ngành hàng</div>
                            <div class="detail-value" th:text="${product.categoryName}">Ngành hàng</div>
                        </div>
                        <div class="col-md-6 detail-item">
                            <div class="detail-label">Giá bán tiêu chuẩn</div>
                            <div class="detail-value text-warning fs-5" th:text="${#numbers.formatDecimal(product.standardPrice, 0, 'COMMA', 0, 'POINT') + ' đ'}">10,000 đ</div>
                        </div>
                    </div>

                    <div class="detail-item">
                        <div class="detail-label">Nhà cung cấp mặc định</div>
                        <div class="detail-value" th:text="${product.defaultSupplierName != null ? product.defaultSupplierName : 'Chưa chỉ định'}">Nhà cung cấp</div>
                    </div>
                </div>
            </div>



            <div class="row mt-3">
                <div class="col-12 detail-item">
                    <div class="detail-label">Thời gian tạo</div>
                    <div class="detail-value" th:text="${product.createdAt != null ? #temporals.format(product.createdAt, 'dd/MM/yyyy HH:mm:ss') : 'N/A'}">N/A</div>
                </div>
            </div>

            <div class="mt-4">
                <a th:href="@{/admin/products}" class="btn btn-secondary w-100">Quay lại danh sách</a>
            </div>
        </div>
    </div>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
