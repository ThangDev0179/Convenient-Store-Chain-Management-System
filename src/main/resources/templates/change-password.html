<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Đổi mật khẩu - Hệ thống quản lý chuỗi cửa hàng tiện lợi')}"></head>
<body>
<div class="app-layout">
    <!-- Sidebar Navigation -->
    <nav th:replace="~{fragments/layout :: sidebar('change-password')}"></nav>
    <div th:replace="~{fragments/layout :: overlay}"></div>
    
    <div class="main-content">
        <!-- Topbar Navigation -->
        <div th:replace="~{fragments/layout :: topbar('Đổi Mật Khẩu')}"></div>
        
        <div class="page-content">
            <div class="dashboard-header mb-4">
                <h1 class="h3 mb-0 font-weight-bold page-heading">ĐỔI MẬT KHẨU CÁ NHÂN</h1>
                <small class="text-muted">Cập nhật mật khẩu mới của bạn để bảo mật tài khoản</small>
            </div>

            <div class="card-glass" style="max-width: 550px; margin: 0 auto;">
                <div class="card-body-glass p-4">
                    <!-- Error Notification -->
                    <div th:if="${error}" class="alert alert-danger text-center mb-4" role="alert">
                        <i class="fa-solid fa-circle-exclamation me-2"></i> <span th:text="${error}">Thông tin nhập vào không hợp lệ</span>
                    </div>

                    <form th:action="@{/change-password}" th:object="${changePasswordRequest}" method="post">
                        <div class="mb-3">
                            <label for="oldPassword" class="form-label text-light">Mật khẩu cũ <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="oldPassword" th:field="*{currentPassword}" placeholder="Nhập mật khẩu hiện tại..." required>
                        </div>

                        <div class="mb-3">
                            <label for="newPassword" class="form-label text-light">Mật khẩu mới <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="newPassword" th:field="*{newPassword}" placeholder="Nhập mật khẩu mới..." required>
                            <div class="form-text text-muted" style="font-size: 0.8rem;">Mật khẩu mới phải dài từ 6 ký tự trở lên.</div>
                        </div>

                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label text-light">Xác nhận mật khẩu mới <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Nhập lại mật khẩu mới..." required>
                        </div>

                        <div class="d-flex gap-2 justify-content-end align-items-center">
                            <a th:href="@{/}" class="btn btn-secondary px-4 py-2">
                                <i class="fa-solid fa-xmark"></i> Hủy Bỏ
                            </a>
                            <button type="submit" class="btn btn-primary px-4 py-2">
                                <i class="fa-solid fa-key"></i> Cập Nhật
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
