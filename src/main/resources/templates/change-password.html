<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu - Hệ thống quản lý chuỗi cửa hàng tiện lợi</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Đổi mật khẩu</h1>
                <p class="auth-subtitle">Vui lòng cập nhật mật khẩu mới của bạn</p>
            </div>

            <!-- Error Notification -->
            <div th:if="${error}" class="alert alert-danger text-center" role="alert">
                <span th:text="${error}">Thông tin nhập vào không hợp lệ</span>
            </div>

            <form th:action="@{/change-password}" th:object="${changePasswordRequest}" method="post">
                <div class="mb-3">
                    <label for="oldPassword" class="form-label">Mật khẩu cũ</label>
                    <input type="password" class="form-control" id="oldPassword" th:field="*{oldPassword}" placeholder="Nhập mật khẩu hiện tại...">
                </div>

                <div class="mb-3">
                    <label for="newPassword" class="form-label">Mật khẩu mới</label>
                    <input type="password" class="form-control" id="newPassword" th:field="*{newPassword}" placeholder="Nhập mật khẩu mới...">
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label">Xác nhận mật khẩu mới</label>
                    <input type="password" class="form-control" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Nhập lại mật khẩu mới...">
                </div>

                <button type="submit" class="btn btn-primary">Cập nhật mật khẩu</button>
            </form>

            <div class="auth-footer">
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-link p-0 m-0 align-baseline" style="color: #818cf8; text-decoration: none; font-weight: 500;">Quay lại đăng nhập</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
