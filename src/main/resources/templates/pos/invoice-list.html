<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Danh sách hóa đơn</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div class="container-fluid py-4">
    <div class="d-flex align-items-center mb-3 gap-2">
        <h4 class="me-auto mb-0"><i class="bi bi-receipt text-primary"></i> Danh sách hóa đơn</h4>
        <a th:href="@{/}" class="btn btn-secondary btn-sm">
            <i class="bi bi-house"></i> Quay lại Dashboard
        </a>
        <a href="/pos/invoices/new" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-circle"></i> POS Bán hàng
        </a>
    </div>

    <!-- Business error alert -->
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filter form -->
    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <form method="get" action="/pos/invoices" class="row g-2 align-items-end">
                <div class="col-md-2">
                    <label class="form-label form-label-sm">Trạng thái</label>
                    <select name="status" class="form-select form-select-sm">
                        <option value="" th:selected="${searchRequest.status() == null}">Tất cả</option>
                        <option th:each="s : ${statuses}"
                                th:value="${s.name()}"
                                th:text="${s.name()}"
                                th:selected="${searchRequest.status() == s}">
                        </option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label form-label-sm">Từ ngày</label>
                    <input type="date" name="fromDate" class="form-control form-control-sm"
                           th:value="${searchRequest.fromDate()}">
                </div>
                <div class="col-md-2">
                    <label class="form-label form-label-sm">Đến ngày</label>
                    <input type="date" name="toDate" class="form-control form-control-sm"
                           th:value="${searchRequest.toDate()}">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary btn-sm w-100">
                        <i class="bi bi-search"></i> Lọc
                    </button>
                </div>
                <div class="col-md-2">
                    <a href="/pos/invoices" class="btn btn-outline-secondary btn-sm w-100">
                        <i class="bi bi-x-circle"></i> Xóa lọc
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Table -->
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Mã hóa đơn</th>
                        <th>Chi nhánh</th>
                        <th>Thu ngân</th>
                        <th class="text-end">Tổng tiền</th>
                        <th class="text-center">Trạng thái</th>
                        <th>Phương thức TT</th>
                        <th>Thời gian</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${invoicePage.content.isEmpty()}">
                        <td colspan="8" class="text-center text-muted py-4">Không có hóa đơn nào</td>
                    </tr>
                    <tr th:each="inv : ${invoicePage.content}">
                        <td><code th:text="${inv.invoiceCode}"></code></td>
                        <td th:text="${inv.branchId}"></td>
                        <td th:text="${inv.cashierName}"></td>
                        <td class="text-end fw-semibold"
                            th:text="${#numbers.formatDecimal(inv.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                        <td class="text-center">
                            <span th:switch="${inv.status.name()}">
                                <span th:case="'Paid'" class="badge bg-success" th:text="${inv.status}"></span>
                                <span th:case="'Draft'" class="badge bg-warning text-dark" th:text="${inv.status}"></span>
                                <span th:case="'Held'" class="badge bg-info text-dark" th:text="${inv.status}"></span>
                                <span th:case="*" class="badge bg-secondary" th:text="${inv.status}"></span>
                            </span>
                        </td>
                        <td th:text="${inv.paymentMethod ?: '—'}"></td>
                        <td>
                            <small th:text="${#temporals.format(inv.createdAt, 'dd/MM/yyyy HH:mm')}"></small>
                        </td>
                        <td>
                            <a th:href="@{'/pos/invoices/' + ${inv.invoiceId}}"
                               class="btn btn-outline-primary btn-sm" title="Xem chi tiết">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:if="${inv.status.name() == 'Draft' || inv.status.name() == 'Held'}"
                               th:href="@{'/pos/invoices/new?invoiceId=' + ${inv.invoiceId}}"
                               class="btn btn-outline-success btn-sm ms-1" title="Mở tại POS để bán tiếp">
                                <i class="bi bi-cart-plus"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <!-- Pagination -->
        <div class="card-footer bg-white d-flex justify-content-between align-items-center"
             th:if="${invoicePage.totalPages > 1}">
            <small class="text-muted"
                   th:text="${'Hiển thị ' + (invoicePage.number * invoicePage.size + 1) + ' – ' +
                              #numbers.min(invoicePage.totalElements, (invoicePage.number + 1) * invoicePage.size) +
                              ' / ' + invoicePage.totalElements + ' hóa đơn'}">
            </small>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li th:each="i : ${#numbers.sequence(0, invoicePage.totalPages - 1)}"
                        th:class="${'page-item ' + (i == invoicePage.number ? 'active' : '')}">
                        <a class="page-link"
                           th:href="@{/pos/invoices(page=${i}, size=${searchRequest.size()}, status=${searchRequest.status()}, fromDate=${searchRequest.fromDate()}, toDate=${searchRequest.toDate()})}"
                           th:text="${i + 1}"></a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
