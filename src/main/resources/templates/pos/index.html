<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS — Bán hàng - Chuỗi Cửa Hàng Tiện Lợi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        #cart-table tbody tr:hover { background: #f0f4ff; }
        #invoice-code-badge { font-size: 0.85rem; }
        .product-card { cursor: pointer; transition: box-shadow 0.15s; }
        .product-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.13); }
        .qty-input { width: 80px; }
        #total-amount { font-size: 1.5rem; font-weight: 700; color: #0d6efd; }
    </style>
</head>
<body>
<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar('pos')}"></nav>
    <div th:replace="~{fragments/layout :: overlay}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Thu ngân (POS)')}"></div>
        <div class="page-content container-fluid">
    <!-- Header row -->
    <div class="row align-items-center mb-3">
        <div class="col-auto">
            <h4 class="mb-0"><i class="bi bi-bag-check-fill text-primary"></i> Bán hàng (POS)</h4>
        </div>
        <div class="col-auto">
            <span id="invoice-code-badge" class="badge bg-secondary" th:text="${'Hóa đơn: ' + (currentInvoiceCode ?: 'Chưa tạo')}">Hóa đơn: Chưa tạo</span>
        </div>
        <div class="col text-end">
            <a th:href="@{/}" class="btn btn-secondary btn-sm me-2">
                <i class="bi bi-house"></i> Quay lại Dashboard
            </a>
            <a href="/pos/invoices" class="btn btn-outline-secondary btn-sm me-2">
                <i class="bi bi-list-ul"></i> DS Hóa đơn
            </a>
            <button id="btn-new-invoice" class="btn btn-primary btn-sm">
                <i class="bi bi-plus-circle"></i> Hóa đơn mới
            </button>
        </div>
    </div>

    <!-- Alert area -->
    <div id="alert-area"></div>

    <div class="row g-3">
        <!-- LEFT: Product search -->
        <div class="col-md-5">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-white fw-semibold">
                    <i class="bi bi-search"></i> Tìm sản phẩm
                </div>
                <div class="card-body">
                    <div class="input-group mb-3">
                        <span class="input-group-text"><i class="bi bi-upc-scan"></i></span>
                        <input type="text" id="search-input" class="form-control"
                               placeholder="Scan barcode hoặc nhập tên sản phẩm..." autofocus>
                        <button class="btn btn-primary" id="btn-search">Tìm</button>
                    </div>
                    <div id="product-results" class="row g-2"></div>
                    <div id="search-pagination" class="mt-2 text-center"></div>
                </div>
            </div>
        </div>

        <!-- RIGHT: Cart -->
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-header bg-white fw-semibold d-flex align-items-center">
                    <i class="bi bi-cart3 me-2"></i> Giỏ hàng
                    <span id="cart-status-badge" class="badge bg-warning text-dark ms-2">Draft</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0" id="cart-table">
                            <thead class="table-light">
                                <tr>
                                    <th>SKU</th>
                                    <th>Tên sản phẩm</th>
                                    <th class="text-end">Đơn giá</th>
                                    <th class="text-center" style="width:110px">SL</th>
                                    <th class="text-end">Thành tiền</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="cart-body">
                                <tr id="empty-cart-row">
                                    <td colspan="6" class="text-center text-muted py-4">
                                        <i class="bi bi-cart-x fs-4"></i><br>Chưa có sản phẩm
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer bg-white">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="fs-6 fw-semibold text-secondary">Tổng cộng</span>
                        <span id="total-amount">0 ₫</span>
                    </div>
                    <div class="d-flex gap-2">
                        <button id="btn-hold" class="btn btn-outline-warning flex-grow-1" disabled>
                            <i class="bi bi-pause-circle"></i> Giữ
                        </button>
                        <button id="btn-cancel" class="btn btn-outline-danger flex-grow-1" disabled>
                            <i class="bi bi-x-circle"></i> Hủy
                        </button>
                        <button id="btn-pay" class="btn btn-success flex-grow-1" disabled data-bs-toggle="modal" data-bs-target="#payModal">
                            <i class="bi bi-credit-card-fill"></i> Thanh toán
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Payment Modal -->
<div class="modal fade" id="payModal" tabindex="-1" aria-labelledby="payModalLabel">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="payModalLabel"><i class="bi bi-credit-card"></i> Phương thức thanh toán</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="d-grid gap-2">
                    <button class="btn btn-outline-secondary pay-method-btn" data-method="Cash">
                        <i class="bi bi-cash-coin fs-4 me-2"></i> Tiền mặt (Cash)
                    </button>
                    <button class="btn btn-outline-primary pay-method-btn" data-method="QR">
                        <i class="bi bi-qr-code-scan fs-4 me-2"></i> QR Code
                    </button>
                    <button class="btn btn-outline-info pay-method-btn" data-method="Bank">
                        <i class="bi bi-bank fs-4 me-2"></i> Chuyển khoản
                    </button>
                    <button class="btn btn-outline-dark pay-method-btn" data-method="Card">
                        <i class="bi bi-credit-card-2-back fs-4 me-2"></i> Thẻ ngân hàng
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

        </div> <!-- page-content -->
    </div> <!-- main-content -->
</div> <!-- app-layout -->

<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:inline="javascript">
/*<![CDATA[*/
let currentInvoiceId = null;
let searchPage = 0;
let currentBranchId = null; // Resolved from first invoice response
const preloadedInvoiceId = /*[[${preloadedInvoiceId}]]*/ null;

// ── Utility ──────────────────────────────────────────────────────────────────
function fmt(amount) {
    return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
}
function showAlert(msg, type = 'danger') {
    document.getElementById('alert-area').innerHTML =
        `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
            ${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
}
function clearAlert() { document.getElementById('alert-area').innerHTML = ''; }

async function loadInvoice(invoiceId) {
    clearAlert();
    const res = await fetch(`/pos/invoices/${invoiceId}/json`, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) { showAlert('Không thể tải hóa đơn'); return; }
    const inv = await res.json();
    currentInvoiceId = inv.invoiceId;
    currentBranchId = inv.branchId;
    document.getElementById('invoice-code-badge').textContent = 'Hóa đơn: ' + inv.invoiceCode;
    updateCartUI(inv);
    enableButtons(inv.status === 'Draft' || inv.status === 'Held');
}

if (preloadedInvoiceId) {
    loadInvoice(preloadedInvoiceId);
}

// ── New Invoice ───────────────────────────────────────────────────────────────
document.getElementById('btn-new-invoice').addEventListener('click', async () => {
    if (currentInvoiceId) {
        const badgeElement = document.getElementById('cart-status-badge');
        const badge = badgeElement ? badgeElement.textContent.trim() : '';
        if (badge === 'Draft' || badge === 'Held') {
            if (!confirm('Bạn đang có hóa đơn chưa thanh toán. Tạo hóa đơn mới sẽ lưu tạm hóa đơn hiện tại dưới dạng nháp. Bạn có chắc chắn muốn tiếp tục?')) {
                return;
            }
        }
    }
    clearAlert();
    const res = await fetch('/pos/invoices', { method: 'POST', headers: { 'Accept': 'application/json' } });
    if (!res.ok) { const e = await res.json(); showAlert(e.message || 'Lỗi tạo hóa đơn'); return; }
    const inv = await res.json();
    currentInvoiceId = inv.invoiceId;
    currentBranchId = inv.branchId;
    document.getElementById('invoice-code-badge').textContent = 'Hóa đơn: ' + inv.invoiceCode;
    updateCartUI(inv);
    enableButtons(true);
});

// ── Product Search ────────────────────────────────────────────────────────────
async function searchProducts(page = 0) {
    const kw = document.getElementById('search-input').value.trim();
    if (!kw) return;
    const params = new URLSearchParams({ page, size: 8, branchId: currentBranchId || '' });
    // Detect if input looks like a barcode (digits only, >= 8 chars) → exact SKU match
    if (/^\d{8,}$/.test(kw)) params.set('sku', kw);
    else params.set('keyword', kw);

    const res = await fetch('/pos/products/search?' + params, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) { showAlert('Lỗi tìm kiếm sản phẩm'); return; }
    const data = await res.json();
    renderProductResults(data, page);
}

document.getElementById('btn-search').addEventListener('click', () => searchProducts(0));
document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchProducts(0);
});

function renderProductResults(data, currentPageNum) {
    const container = document.getElementById('product-results');
    const pag = document.getElementById('search-pagination');
    container.innerHTML = '';
    if (!data.content || data.content.length === 0) {
        container.innerHTML = '<div class="col text-muted">Không tìm thấy sản phẩm</div>';
        pag.innerHTML = '';
        return;
    }
    data.content.forEach(p => {
        const hasPromo = p.activePromotionId !== null;
        const discountLabel = hasPromo
            ? (p.discountType === 'Percentage' ? `-${p.discountValue}%` : `-${fmt(p.discountValue)}`)
            : '';
        container.innerHTML += `
        <div class="col-6">
          <div class="card product-card p-2 mb-1" onclick="addToCart(${p.productId})">
            <div class="fw-semibold text-truncate" title="${p.productName}">${p.productName}</div>
            <small class="text-muted">${p.sku}</small>
            <div class="mt-1 d-flex justify-content-between align-items-center">
              <span class="text-primary fw-bold">${fmt(p.effectivePrice)}</span>
              ${hasPromo ? `<span class="badge bg-danger">${discountLabel}</span>` : ''}
            </div>
            <small class="text-secondary">Còn: ${p.qtyAvailable}</small>
          </div>
        </div>`;
    });
    // Simple pagination
    if (data.totalPages > 1) {
        let pagHtml = '<nav><ul class="pagination pagination-sm mb-0">';
        for (let i = 0; i < data.totalPages; i++) {
            pagHtml += `<li class="page-item ${i === currentPageNum ? 'active' : ''}">
                <a class="page-link" href="#" onclick="searchProducts(${i});return false;">${i + 1}</a></li>`;
        }
        pag.innerHTML = pagHtml + '</ul></nav>';
    }
}

// ── Add to Cart ────────────────────────────────────────────────────────────────
async function addToCart(productId) {
    if (!currentInvoiceId) { showAlert('Vui lòng tạo hóa đơn mới trước!', 'warning'); return; }
    clearAlert();
    const res = await fetch(`/pos/invoices/${currentInvoiceId}/items`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ productId, quantity: 1 })
    });
    const data = await res.json();
    if (!res.ok) { showAlert(data.message || 'Lỗi thêm sản phẩm'); return; }
    updateCartUI(data);
}

// ── Update Quantity ────────────────────────────────────────────────────────────
async function updateQty(detailId, qty) {
    if (!currentInvoiceId || qty <= 0) return;
    const res = await fetch(`/pos/invoices/${currentInvoiceId}/items/${detailId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ quantity: parseFloat(qty) })
    });
    const data = await res.json();
    if (!res.ok) { showAlert(data.message || 'Lỗi cập nhật'); return; }
    updateCartUI(data);
}

// ── Remove Item ────────────────────────────────────────────────────────────────
async function removeItem(detailId) {
    if (!currentInvoiceId) return;
    const res = await fetch(`/pos/invoices/${currentInvoiceId}/items/${detailId}`, {
        method: 'DELETE', headers: { 'Accept': 'application/json' }
    });
    const data = await res.json();
    if (!res.ok) { showAlert(data.message || 'Lỗi xóa sản phẩm'); return; }
    updateCartUI(data);
}

// ── Cart UI Rendering ─────────────────────────────────────────────────────────
function updateCartUI(inv) {
    const tbody = document.getElementById('cart-body');
    const badge = document.getElementById('cart-status-badge');
    badge.textContent = inv.status;
    badge.className = 'badge ms-2 ' + statusBadgeClass(inv.status);

    let hasStockError = false;

    if (!inv.items || inv.items.length === 0) {
        tbody.innerHTML = `<tr id="empty-cart-row"><td colspan="6" class="text-center text-muted py-4">
            <i class="bi bi-cart-x fs-4"></i><br>Chưa có sản phẩm</td></tr>`;
        clearAlert();
    } else {
        tbody.innerHTML = inv.items.map(d => {
            const isExceeded = d.quantity > d.qtyAvailable;
            if (isExceeded) {
                hasStockError = true;
            }
            return `
            <tr class="${isExceeded ? 'table-warning' : ''}">
              <td><small class="text-muted">${d.sku || ''}</small></td>
              <td>
                <div class="fw-semibold">${d.productName || ''}</div>
                ${isExceeded ? `<div class="text-danger small mt-1"><i class="bi bi-exclamation-circle-fill"></i> Vượt quá tồn kho (Còn: ${d.qtyAvailable})</div>` : ''}
              </td>
              <td class="text-end">${fmt(d.unitPrice)}</td>
              <td class="text-center">
                <input type="number" class="form-control form-control-sm qty-input text-center ${isExceeded ? 'is-invalid border-danger text-danger' : ''}"
                       value="${d.quantity}" min="0.001" step="0.001"
                       onchange="updateQty(${d.invoiceDetailId}, this.value)">
              </td>
              <td class="text-end fw-semibold">${fmt(d.lineTotal || d.unitPrice * d.quantity)}</td>
              <td>
                <button class="btn btn-outline-danger btn-sm" onclick="removeItem(${d.invoiceDetailId})">
                    <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>`;
        }).join('');

        if (hasStockError) {
            showAlert('⚠️ Có sản phẩm vượt quá tồn kho khả dụng của chi nhánh! Nút Thanh toán đã bị khóa.', 'warning');
        } else {
            clearAlert();
        }
    }

    document.getElementById('total-amount').textContent = fmt(inv.totalAmount || 0);
    const hasItems = inv.items && inv.items.length > 0;
    document.getElementById('btn-pay').disabled = !hasItems || inv.status === 'Paid' || inv.status === 'Canceled' || hasStockError;
    document.getElementById('btn-hold').disabled = inv.status !== 'Draft';
    document.getElementById('btn-cancel').disabled = inv.status === 'Paid' || inv.status === 'Canceled';
}

function statusBadgeClass(status) {
    const m = { Draft: 'bg-warning text-dark', Held: 'bg-info text-dark', Paid: 'bg-success', Canceled: 'bg-secondary' };
    return m[status] || 'bg-secondary';
}

function enableButtons(on) {
    ['btn-hold', 'btn-cancel'].forEach(id => document.getElementById(id).disabled = !on);
}

// ── Hold ─────────────────────────────────────────────────────────────────────
document.getElementById('btn-hold').addEventListener('click', async () => {
    const res = await fetch(`/pos/invoices/${currentInvoiceId}/hold`, { method: 'PUT', headers: { 'Accept': 'application/json' } });
    const data = await res.json();
    if (!res.ok) { showAlert(data.message); return; }
    updateCartUI(data);
    showAlert('Hóa đơn đã được giữ lại.', 'info');
});

// ── Cancel ────────────────────────────────────────────────────────────────────
document.getElementById('btn-cancel').addEventListener('click', async () => {
    if (!confirm('Bạn có chắc muốn hủy hóa đơn này?')) return;
    const res = await fetch(`/pos/invoices/${currentInvoiceId}/cancel`, { method: 'PUT', headers: { 'Accept': 'application/json' } });
    const data = await res.json();
    if (!res.ok) { showAlert(data.message); return; }
    updateCartUI(data);
    showAlert('Hóa đơn đã hủy.', 'warning');
});

// ── Payment ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.pay-method-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
        const method = btn.dataset.method;
        const modal = bootstrap.Modal.getInstance(document.getElementById('payModal'));
        modal.hide();
        clearAlert();
        const res = await fetch(`/pos/invoices/${currentInvoiceId}/pay`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ paymentMethod: method })
        });
        const data = await res.json();
        if (!res.ok) { showAlert(data.message || 'Thanh toán thất bại'); return; }
        updateCartUI(data);
        showAlert(`✅ Thanh toán thành công! Mã HĐ: <strong>${data.invoiceCode}</strong> — ${method}`, 'success');
    });
});
/*]]>*/
</script>
</body>
</html>
