<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${'Hóa đơn ' + invoice.invoiceCode()}">Chi tiết hóa đơn</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div class="container py-4" style="max-width:900px">
    <div class="d-flex align-items-center mb-3">
        <a href="/pos/invoices" class="btn btn-outline-secondary btn-sm me-3">
            <i class="bi bi-arrow-left"></i> Quay lại
        </a>
        <h4 class="mb-0" th:text="${'Hóa đơn: ' + invoice.invoiceCode()}">Chi tiết hóa đơn</h4>
        <span class="ms-2 badge"
              th:text="${invoice.status()}"
              th:classappend="${invoice.status().name() == 'Paid' ? ' bg-success' :
                               invoice.status().name() == 'Draft' ? ' bg-warning text-dark' :
                               invoice.status().name() == 'Held' ? ' bg-info text-dark' : ' bg-secondary'}">
        </span>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-header fw-semibold bg-white">Thông tin hóa đơn</div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <dl class="row mb-0">
                        <dt class="col-sm-5 text-muted">Mã HĐ</dt>
                        <dd class="col-sm-7"><code th:text="${invoice.invoiceCode()}"></code></dd>
                        <dt class="col-sm-5 text-muted">Chi nhánh</dt>
                        <dd class="col-sm-7" th:text="${invoice.branchId()}"></dd>
                        <dt class="col-sm-5 text-muted">Thu ngân</dt>
                        <dd class="col-sm-7" th:text="${invoice.cashierName()}"></dd>
                        <dt class="col-sm-5 text-muted">Phương thức TT</dt>
                        <dd class="col-sm-7" th:text="${invoice.paymentMethod() ?: '—'}"></dd>
                    </dl>
                </div>
                <div class="col-md-6">
                    <dl class="row mb-0">
                        <dt class="col-sm-5 text-muted">Tạo lúc</dt>
                        <dd class="col-sm-7"
                            th:text="${#temporals.format(invoice.createdAt(), 'dd/MM/yyyy HH:mm:ss')}"></dd>
                        <dt class="col-sm-5 text-muted" th:if="${invoice.paidAt() != null}">Thanh toán lúc</dt>
                        <dd class="col-sm-7" th:if="${invoice.paidAt() != null}"
                            th:text="${#temporals.format(invoice.paidAt(), 'dd/MM/yyyy HH:mm:ss')}"></dd>
                        <dt class="col-sm-5 text-muted" th:if="${invoice.canceledAt() != null}">Hủy lúc</dt>
                        <dd class="col-sm-7" th:if="${invoice.canceledAt() != null}"
                            th:text="${#temporals.format(invoice.canceledAt(), 'dd/MM/yyyy HH:mm:ss')}"></dd>
                    </dl>
                </div>
            </div>
        </div>
    </div>

    <!-- Items -->
    <div class="card shadow-sm mb-3">
        <div class="card-header fw-semibold bg-white">Chi tiết sản phẩm</div>
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>SKU</th>
                        <th>Tên sản phẩm</th>
                        <th class="text-end">Đơn giá</th>
                        <th class="text-end">Số lượng</th>
                        <th class="text-end">Thành tiền</th>
                        <th>Khuyến mãi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item, iStat : ${invoice.items()}">
                        <td th:text="${iStat.index + 1}"></td>
                        <td><small class="text-muted" th:text="${item.sku()}"></small></td>
                        <td th:text="${item.productName()}"></td>
                        <td class="text-end"
                            th:text="${#numbers.formatDecimal(item.unitPrice(), 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                        <td class="text-end" th:text="${item.quantity()}"></td>
                        <td class="text-end fw-semibold"
                            th:text="${#numbers.formatDecimal(item.lineTotal(), 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                        <td>
                            <span th:if="${item.promotionId() != null}"
                                  class="badge bg-danger" th:text="${'KM#' + item.promotionId()}"></span>
                            <span th:if="${item.promotionId() == null}" class="text-muted">—</span>
                        </td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr class="table-light fw-bold">
                        <td colspan="5" class="text-end">TỔNG CỘNG</td>
                        <td class="text-end text-primary fs-5"
                            th:text="${#numbers.formatDecimal(invoice.totalAmount(), 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <!-- Action buttons -->
    <div class="d-flex gap-2">
        <a th:if="${invoice.status().name() == 'Paid'}"
           th:href="@{'/refunds/create?invoiceCode=' + ${invoice.invoiceCode()}}"
           class="btn btn-outline-warning">
            <i class="bi bi-arrow-return-left"></i> Tạo yêu cầu đổi trả
        </a>
        <a th:if="${invoice.status().name() == 'Draft' || invoice.status().name() == 'Held'}"
           th:href="@{'/pos/invoices/new?invoiceId=' + ${invoice.invoiceId()}}"
           class="btn btn-success">
            <i class="bi bi-cart-plus"></i> Tiếp tục bán hàng (Mở tại POS)
        </a>
        <button onclick="window.print()" class="btn btn-outline-secondary">
            <i class="bi bi-printer"></i> In hóa đơn
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
