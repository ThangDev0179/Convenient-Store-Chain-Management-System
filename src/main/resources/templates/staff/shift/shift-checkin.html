<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in/out Ca làm việc - Hệ thống bán lẻ</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .shift-banner {
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
        }
        .banner-open {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #a7f3d0;
        }
        .banner-closed {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
        }
        .btn-shift-action {
            font-size: 1.5rem;
            font-weight: 700;
            padding: 30px 60px;
            border-radius: 16px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            border: none;
        }
        .btn-check-in {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        .btn-check-in:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(16, 185, 129, 0.4);
        }
        .btn-check-out {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        .btn-check-out:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(239, 68, 68, 0.4);
        }
    </style>
</head>
<body>
    <div class="auth-wrapper" style="max-width: 600px; margin-top: 50px;">
        <div class="auth-card p-5">
            <div class="auth-header text-center">
                <h1 class="auth-title" style="background: linear-gradient(to right, #a5b4fc, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">CHECK-IN & CHECK-OUT</h1>
                <p class="auth-subtitle">Ghi nhận giờ bắt đầu và kết thúc ca làm việc của bạn</p>
            </div>

            <!-- Messages notifications -->
            <div th:if="${success}" class="alert alert-success text-center" role="alert">
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger text-center" role="alert">
                <span th:text="${error}"></span>
            </div>

            <!-- Current State Banner -->
            <div class="shift-banner" th:classappend="${isOpen ? 'banner-open' : 'banner-closed'}">
                <h2 class="h5 mb-2 font-weight-bold" th:text="${isOpen ? 'CA LÀM VIỆC ĐANG MỞ' : 'CHƯA CHECK-IN CA LÀM VIỆC'}">Trạng thái</h2>
                <div th:if="${isOpen}" class="mt-3">
                    <p class="mb-1" style="font-size: 0.88rem;">
                        <strong>Bắt đầu lúc:</strong> <span th:text="${#temporals.format(activeShift.checkInTime, 'dd/MM/yyyy HH:mm:ss')}"></span>
                    </p>
                    <p class="mb-1" style="font-size: 0.88rem;">
                        <strong>Chi nhánh:</strong> <span th:text="${activeShift.branch.branchName}"></span>
                    </p>
                </div>
                <div th:if="${!isOpen}">
                    <p class="mb-0" style="font-size: 0.88rem;">Vui lòng nhấn nút check-in dưới đây khi bắt đầu vào ca.</p>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="text-center my-4">
                <!-- Check-in form -->
                <form th:if="${!isOpen}" th:action="@{/staff/shift/check-in}" method="post">
                    <button type="submit" class="btn-shift-action btn-check-in w-100">Check-In</button>
                </form>

                <!-- Check-out form -->
                <form th:if="${isOpen}" th:action="@{/staff/shift/check-out}" method="post" onsubmit="return confirm('Bạn có chắc muốn check-out ca làm việc hiện tại? Sau đó bạn cần khai báo kết ca bàn giao tiền.');">
                    <button type="submit" class="btn-shift-action btn-check-out w-100">Check-Out</button>
                </form>
            </div>

            <div class="d-flex gap-2 justify-content-center mt-3 border-top border-secondary pt-4">
                <a th:href="@{/staff/shift/history}" class="btn btn-outline-light w-50" style="border-radius: 8px; border-color: var(--card-border);">Lịch sử ca làm</a>
                <a th:href="@{/}" class="btn btn-secondary w-50" style="border-radius: 8px; margin-top: 15px;">Dashboard</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
