<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Staff Dashboard')}"></head>
<body>
<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar('staff-dashboard')}"></nav>
    <div th:replace="~{fragments/layout :: overlay}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Staff Dashboard')}"></div>
        <div class="page-content">
            
            <div class="dashboard-header mb-4 d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="h3 mb-0 font-weight-bold" style="background: linear-gradient(to right, #6366f1, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                        STAFF DASHBOARD
                    </h1>
                    <small class="text-muted">Hệ thống bán hàng nhân viên thu ngân</small>
                </div>
                <div>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-secondary">Đăng xuất</button>
                    </form>
                </div>
            </div>

            <div class="row">
                <div class="col-md-12">
                    <div th:if="${employee != null}" class="card-glass p-4 mb-4">
                        <h4 class="mb-4 text-light">Thông tin tài khoản</h4>
                        
                        <div class="d-flex justify-content-between mb-3 border-bottom border-secondary pb-2">
                            <span class="text-secondary">Mã nhân viên:</span>
                            <span class="text-info font-weight-bold" th:text="${employee.employeeCode}">EMP003</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 border-bottom border-secondary pb-2">
                            <span class="text-secondary">Tên đăng nhập:</span>
                            <span class="text-light" th:text="${employee.username}">staff</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 border-bottom border-secondary pb-2">
                            <span class="text-secondary">Họ và tên:</span>
                            <span class="text-light" th:text="${employee.fullName}">Nguyễn Văn Staff</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 border-bottom border-secondary pb-2">
                            <span class="text-secondary">Vai trò:</span>
                            <span>
                                <span class="badge bg-primary bg-opacity-25 text-primary border border-primary border-opacity-50 px-2 py-1" th:text="${employee.role.roleName}">Sales Staff</span>
                            </span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span class="text-secondary">Cửa hàng làm việc:</span>
                            <span class="text-light" th:text="${employee.branch != null ? employee.branch.branchName : 'Chưa phân công'}">Chi nhánh Quận 1</span>
                        </div>
                    </div>

                    <div class="mt-4 text-center d-flex gap-3 justify-content-center flex-wrap">
                        <a th:href="@{/change-password}" class="btn btn-secondary px-4">Thay đổi mật khẩu</a>
                        <a th:href="@{/staff/shift}" class="btn btn-primary px-4">Bắt đầu ca bán hàng</a>
                        <a th:href="@{/transfer}" class="btn btn-info px-4 text-white">Điều chuyển kho</a>
                        <a th:href="@{/disposal}" class="btn btn-warning px-4 text-white">Xuất hủy hàng</a>
                        <a th:href="@{/inventory-count}" class="btn px-4 text-white" style="background-color: #8b5cf6;">Kiểm kê kho</a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
