<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Chi tiết Phiếu Xuất Hủy')}"></head>
<body>
<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar('disposal')}"></nav>
    <div th:replace="~{fragments/layout :: overlay}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Chi tiết Phiếu Xuất Hủy')}"></div>
        <div class="page-content">

            <div class="dashboard-header d-flex justify-content-between align-items-center mb-3">
                <h2 class="page-heading"><i class="fa-solid fa-trash-can text-danger me-2"></i> Chi tiết Phiếu Xuất Hủy</h2>
                <a href="/disposal" class="btn btn-secondary">
                    <i class="fa-solid fa-arrow-left me-1"></i> Quay lại
                </a>
            </div>

            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Thông tin chung -->
            <div class="card-glass mb-4">
                <div class="card-header-glass fw-bold">Thông tin phiếu</div>
                <div class="card-body-glass row g-3">
                    <div class="col-md-3"><strong>Mã phiếu:</strong> <span th:text="${disposal.disposalCode}"></span></div>
                    <div class="col-md-3"><strong>Chi nhánh:</strong> <span th:text="${disposal.branch.branchName}"></span></div>
                    <div class="col-md-3">
                        <strong>Trạng thái: </strong>
                        <span th:class="${'badge-status ' + 
                            (disposal.status.name() == 'Draft' ? 'status-secondary' : 
                            (disposal.status.name() == 'Approved' ? 'status-success' : 'status-danger'))}"
                              th:text="${disposal.status}">
                        </span>
                    </div>
                    <div class="col-md-3">
                        <strong>Nguồn: </strong>
                        <span th:class="${'badge-status ' + 
                            (disposal.sourceType.name() == 'Manual' ? 'status-primary' : 
                            (disposal.sourceType.name() == 'TransferLoss' ? 'status-warning' : 'status-info'))}"
                              th:text="${disposal.sourceType}">
                        </span>
                    </div>
                    <div class="col-md-4"><strong>Người tạo:</strong> <span th:text="${disposal.createdBy.fullName}"></span></div>
                    <div class="col-md-4"><strong>Ngày tạo:</strong> <span th:text="${#temporals.format(disposal.createdAt, 'dd/MM/yyyy HH:mm')}"></span></div>
                    <div class="col-md-4">
                        <strong>Lý do:</strong> <span th:text="${disposal.reason != null ? disposal.reason : '-'}"></span>
                    </div>
                    <div class="col-md-4" th:if="${disposal.approvedBy != null}">
                        <strong>Người duyệt:</strong> <span th:text="${disposal.approvedBy.fullName}"></span>
                    </div>
                    <div class="col-md-4" th:if="${disposal.approvedAt != null}">
                        <strong>Ngày duyệt:</strong> <span th:text="${#temporals.format(disposal.approvedAt, 'dd/MM/yyyy HH:mm')}"></span>
                    </div>
                </div>
            </div>

            <!-- Hành động -->
            <div class="mb-4 d-flex gap-2" sec:authorize="hasAnyRole('MANAGER','ADMIN')">
                <!-- Approve -->
                <form th:if="${disposal.status.name() == 'Draft'}"
                      th:action="@{/disposal/{id}/approve(id=${disposal.disposalId})}" method="post">
                    <button type="submit" class="btn btn-success"
                            onclick="return confirm('Bạn có chắc muốn phê duyệt phiếu hủy này không?')">
                        <i class="fa-solid fa-check-circle me-1"></i>Phê duyệt
                    </button>
                </form>
                <!-- Reject -->
                <form th:if="${disposal.status.name() == 'Draft'}"
                      th:action="@{/disposal/{id}/reject(id=${disposal.disposalId})}" method="post">
                    <button type="submit" class="btn btn-danger"
                            onclick="return confirm('Bạn có chắc muốn từ chối phiếu hủy này không?')">
                        <i class="fa-solid fa-xmark-circle me-1"></i>Từ chối
                    </button>
                </form>
            </div>

            <!-- Danh sách sản phẩm -->
            <div class="card-glass mb-4">
                <div class="card-header-glass fw-bold">Danh sách hàng hủy</div>
                <div class="table-responsive">
                    <table class="table-glass w-100 mb-0">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Sản phẩm (ID)</th>
                                <th>SL Hủy</th>
                                <th>Đơn giá Ước tính</th>
                                <th>Giá trị tổn thất (Loss Value)</th>
                                <th>Ghi chú</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="detail, stat : ${disposal.details}">
                                <td th:text="${stat.index + 1}"></td>
                                <td th:text="${detail.product.productName + ' (' + detail.product.productId + ')'}"></td>
                                <td class="text-danger fw-bold" th:text="${detail.quantityDisposed}"></td>
                                <td th:text="${detail.unitCost}"></td>
                                <td class="text-danger fw-bold" th:text="${detail.quantityDisposed.multiply(detail.unitCost)}"></td>
                                <td th:text="${detail.note != null ? detail.note : '-'}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
