<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Xuất Hủy Hàng')}"></head>
<body>
<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar('disposal')}"></nav>
    <div th:replace="~{fragments/layout :: overlay}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Xuất Hủy Hàng')}"></div>
        <div class="page-content">

            <div class="dashboard-header d-flex justify-content-between align-items-center mb-3">
                <h2 class="page-heading"><i class="fa-solid fa-trash-can me-2 text-danger"></i> Phiếu Xuất Hủy (Stock Disposal)</h2>
                <a href="/disposal/create" class="btn btn-primary" sec:authorize="hasAnyRole('MANAGER','ADMIN')">
                    <i class="fa-solid fa-plus-circle me-1"></i> Tạo phiếu hủy thủ công
                </a>
            </div>

            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card-glass">
                <div class="table-responsive">
                    <table class="table-glass w-100 mb-0">
                        <thead>
                            <tr>
                                <th>Mã phiếu</th>
                                <th>Chi nhánh</th>
                                <th>Nguồn tạo</th>
                                <th>Trạng thái</th>
                                <th>Lý do</th>
                                <th>Người tạo</th>
                                <th>Ngày tạo</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(disposals)}">
                                <td colspan="8" class="text-center text-muted py-4">Chưa có phiếu xuất hủy nào</td>
                            </tr>
                            <tr th:each="d : ${disposals}">
                                <td th:text="${d.disposalCode}"></td>
                                <td th:text="${d.branch.branchName}"></td>
                                <td>
                                    <span th:class="${'badge-status ' + 
                                        (d.sourceType.name() == 'Manual' ? 'status-info' : 
                                        (d.sourceType.name() == 'TransferLoss' ? 'status-warning' : 'status-primary'))}"
                                          th:text="${d.sourceType}">
                                    </span>
                                </td>
                                <td>
                                    <span th:class="${'badge-status ' + 
                                        (d.status.name() == 'Draft' ? 'status-secondary' : 
                                        (d.status.name() == 'Approved' ? 'status-success' : 'status-danger'))}"
                                          th:text="${d.status}">
                                    </span>
                                </td>
                                <td class="text-truncate" style="max-width: 200px;" th:title="${d.reason != null ? d.reason : '-'}" th:text="${d.reason != null ? d.reason : '-'}"></td>
                                <td th:text="${d.createdBy.fullName}"></td>
                                <td th:text="${#temporals.format(d.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                                <td>
                                    <a th:href="@{/disposal/{id}(id=${d.disposalId})}" class="btn btn-sm btn-info">
                                        <i class="fa-solid fa-eye"></i> Xem
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
