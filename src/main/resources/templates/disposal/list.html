<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Danh sách Phiếu Xuất Hủy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-trash3 me-2 text-danger"></i>Phiếu Xuất Hủy (Stock Disposal)</h2>
        <a href="/disposal/create" class="btn btn-primary" sec:authorize="hasAnyRole('MANAGER','ADMIN')">
            <i class="bi bi-plus-circle me-1"></i> Tạo phiếu hủy thủ công
        </a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" th:text="${successMessage}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" th:text="${errorMessage}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Mã phiếu</th>
                        <th>Chi nhánh</th>
                        <th>Nguồn tạo</th>
                        <th>Trạng thái</th>
                        <th>Lý do</th>
                        <th>Người tạo</th>
                        <th>Ngày tạo</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(disposals)}">
                        <td colspan="8" class="text-center text-muted py-4">Chưa có phiếu xuất hủy nào</td>
                    </tr>
                    <tr th:each="d : ${disposals}">
                        <td th:text="${d.disposalCode}"></td>
                        <td th:text="${d.branch.branchName}"></td>
                        <td>
                            <span th:class="${'badge ' + 
                                (d.sourceType.name() == 'Manual' ? 'bg-primary' : 
                                (d.sourceType.name() == 'TransferLoss' ? 'bg-warning text-dark' : 'bg-info text-dark'))}"
                                  th:text="${d.sourceType}">
                            </span>
                        </td>
                        <td>
                            <span th:class="${'badge ' + 
                                (d.status.name() == 'Draft' ? 'bg-secondary' : 
                                (d.status.name() == 'Approved' ? 'bg-success' : 'bg-danger'))}"
                                  th:text="${d.status}">
                            </span>
                        </td>
                        <td th:text="${d.reason != null ? d.reason : '-'}"></td>
                        <td th:text="${d.createdBy.fullName}"></td>
                        <td th:text="${#temporals.format(d.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <a th:href="@{/disposal/{id}(id=${d.disposalId})}" class="btn btn-sm btn-info">
                                <i class="bi bi-eye"></i> Xem
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
