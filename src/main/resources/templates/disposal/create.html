<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Tạo Phiếu Xuất Hủy')}"></head>
<body>
<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar('disposal')}"></nav>
    <div th:replace="~{fragments/layout :: overlay}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Tạo Phiếu Xuất Hủy')}"></div>
        <div class="page-content">

            <div class="dashboard-header mb-4">
                <h2 class="page-heading"><i class="fa-solid fa-trash-can text-danger me-2"></i> Tạo Phiếu Xuất Hủy Thủ Công</h2>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/disposal/create}" th:object="${request}" method="post" id="disposalForm">
                <div class="card-glass mb-4">
                    <div class="card-header-glass fw-bold">Thông tin chung</div>
                    <div class="card-body-glass row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Chi nhánh thực hiện <span class="text-danger">*</span></label>
                            <input type="number" th:field="*{branchId}" class="form-control"
                                   th:classappend="${#fields.hasErrors('branchId')} ? 'is-invalid'" placeholder="ID chi nhánh"/>
                            <div class="invalid-feedback" th:errors="*{branchId}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Lý do hủy hàng</label>
                            <input type="text" th:field="*{reason}" class="form-control" placeholder="Nhập lý do chi tiết"/>
                        </div>
                    </div>
                </div>

                <div class="card-glass mb-4">
                    <div class="card-header-glass fw-bold d-flex justify-content-between align-items-center">
                        Danh sách sản phẩm hủy
                        <button type="button" class="btn btn-sm btn-outline-primary" onclick="addRow()">
                            <i class="fa-solid fa-plus"></i> Thêm sản phẩm
                        </button>
                    </div>
                    <div class="table-responsive">
                        <table class="table-glass w-100 mb-0" id="detailTable">
                            <thead>
                                <tr>
                                    <th>Product ID</th>
                                    <th>Số lượng hủy</th>
                                    <th>Ghi chú</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="detailBody">
                                <tr>
                                    <td><input type="number" name="details[0].productId" class="form-control" placeholder="ID" required/></td>
                                    <td><input type="number" name="details[0].quantityDisposed" step="0.001" min="0.001" class="form-control" placeholder="SL" required/></td>
                                    <td><input type="text" name="details[0].note" class="form-control" placeholder="Ghi chú thêm"/></td>
                                    <td><button type="button" class="btn btn-sm btn-danger" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger"><i class="fa-solid fa-save me-1"></i>Lưu phiếu hủy</button>
                    <a href="/disposal" class="btn btn-secondary">Hủy</a>
                </div>
            </form>

        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    let rowIndex = 1;
    function addRow() {
        const tbody = document.getElementById('detailBody');
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><input type="number" name="details[${rowIndex}].productId" class="form-control" placeholder="ID" required/></td>
            <td><input type="number" name="details[${rowIndex}].quantityDisposed" step="0.001" min="0.001" class="form-control" placeholder="SL" required/></td>
            <td><input type="text" name="details[${rowIndex}].note" class="form-control" placeholder="Ghi chú thêm"/></td>
            <td><button type="button" class="btn btn-sm btn-danger" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button></td>
        `;
        tbody.appendChild(row);
        rowIndex++;
    }
    function removeRow(btn) {
        const row = btn.closest('tr');
        const tbody = document.getElementById('detailBody');
        if (tbody.rows.length > 1) row.remove();
    }
</script>
</body>
</html>
