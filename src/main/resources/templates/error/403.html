<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Quyền truy cập bị từ chối</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card text-center">
            <div class="auth-header">
                <h1 class="auth-title" style="font-size: 5rem; font-weight: 800; background: linear-gradient(to right, #fca5a5, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">403</h1>
                <p class="auth-subtitle" style="font-size: 1.2rem; color: #fca5a5;">Truy cập bị từ chối / Access Denied</p>
            </div>
            <p class="mb-4 text-secondary">
                Bạn không có quyền truy cập vào trang này. Vui lòng liên hệ với Quản trị viên hệ thống nếu bạn nghĩ đây là một sự nhầm lẫn.
            </p>
            <div class="mt-4">
                <a th:href="@{/}" class="btn btn-primary d-inline-block px-5" style="width: auto;">Quay lại Trang chủ</a>
            </div>
        </div>
    </div>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
