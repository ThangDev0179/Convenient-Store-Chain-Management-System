<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('403 - Quyền truy cập bị từ chối')}"></head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="auth-wrapper">
        <div class="auth-card text-center">
            <div class="auth-header">
                <h1 class="auth-title error-code" style="font-size: 5rem; font-weight: 800; background: linear-gradient(to right, #fca5a5, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">403</h1>
                <p class="auth-subtitle" style="font-size: 1.2rem; color: #fca5a5;">Truy cập bị từ chối / Access Denied</p>
            </div>
            <p class="mb-4 text-secondary">
                Bạn không có quyền truy cập vào trang này. Vui lòng liên hệ với Quản trị viên hệ thống nếu bạn nghĩ đây là một sự nhầm lẫn.
            </p>
            <div class="mt-4">
                <a th:href="@{/}" class="btn btn-primary d-inline-block px-5" style="width: auto;">Quay lại Trang chủ</a>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
