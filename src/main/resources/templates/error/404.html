<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Không tìm thấy trang</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card text-center">
            <div class="auth-header">
                <h1 class="auth-title" style="font-size: 5rem; font-weight: 800; background: linear-gradient(to right, #a5b4fc, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">404</h1>
                <p class="auth-subtitle" style="font-size: 1.2rem; color: #a5b4fc;">Không tìm thấy trang / Page Not Found</p>
            </div>
            <p class="mb-4 text-secondary">
                Đường dẫn bạn yêu cầu không tồn tại hoặc đã bị gỡ bỏ khỏi hệ thống.
            </p>
            <div class="mt-4">
                <a th:href="@{/}" class="btn btn-primary d-inline-block px-5" style="width: auto;">Quay lại Trang chủ</a>
            </div>
        </div>
    </div>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
