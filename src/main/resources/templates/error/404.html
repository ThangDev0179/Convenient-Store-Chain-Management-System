<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('404 - Không tìm thấy trang')}"></head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="auth-wrapper">
        <div class="auth-card text-center">
            <div class="auth-header">
                <h1 class="auth-title error-code" style="font-size: 5rem; font-weight: 800; background: linear-gradient(to right, #a5b4fc, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">404</h1>
                <p class="auth-subtitle" style="font-size: 1.2rem; color: #a5b4fc;">Không tìm thấy trang / Page Not Found</p>
            </div>
            <p class="mb-4 text-secondary">
                Đường dẫn bạn yêu cầu không tồn tại hoặc đã bị gỡ bỏ khỏi hệ thống.
            </p>
            <div class="mt-4">
                <a th:href="@{/}" class="btn btn-primary d-inline-block px-5" style="width: auto;">Quay lại Trang chủ</a>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
