<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inventory Count Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Count Details: <span th:text="${count.countCode}"></span></h2>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    <p>Status: <span th:text="${count.status}"></span></p>

    <form th:if="${count.status.name() == 'Draft'}" th:action="@{/inventory-count/{id}/submit(id=${count.inventoryCountId})}" method="post" style="display:inline;">
        <button type="submit" class="btn btn-warning" onclick="return confirm('Submit this count for approval?')">Submit</button>
    </form>
    
    <form th:if="${count.status.name() == 'Submitted'}" th:action="@{/inventory-count/{id}/approve(id=${count.inventoryCountId})}" method="post" style="display:inline;">
        <button type="submit" class="btn btn-success" onclick="return confirm('Approve and update inventory?')">Approve</button>
    </form>

    <form th:if="${count.status.name() == 'Submitted'}" th:action="@{/inventory-count/{id}/reject(id=${count.inventoryCountId})}" method="post" style="display:inline;">
        <button type="submit" class="btn btn-danger" onclick="return confirm('Reject this count?')">Reject</button>
    </form>

    <table class="table mt-3">
        <thead><tr><th>Product ID</th><th>System Qty</th><th>Actual Qty</th><th>Delta</th></tr></thead>
        <tbody>
            <tr th:each="detail : ${count.details}">
                <td th:text="${detail.product.productId}"></td>
                <td th:text="${detail.systemQty}"></td>
                <td th:text="${detail.actualQty}"></td>
                <td th:text="${detail.actualQty.subtract(detail.systemQty)}"
                    th:class="${detail.actualQty.subtract(detail.systemQty).compareTo(T(java.math.BigDecimal).ZERO) lt 0} ? 'text-danger' : 'text-success'"></td>
            </tr>
        </tbody>
    </table>
    <a href="/inventory-count" class="btn btn-secondary mt-3">Back to List</a>
</div>
</body>
</html>
