<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inventory Counts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Inventory Counts</h2>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    <a href="/inventory-count/create" class="btn btn-primary mb-3">Create New Count</a>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Code</th>
                <th>Branch</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="count : ${counts}">
                <td th:text="${count.inventoryCountId}"></td>
                <td th:text="${count.countCode}"></td>
                <td th:text="${count.branch.branchId}"></td>
                <td th:text="${count.status}"></td>
                <td><a th:href="@{/inventory-count/{id}(id=${count.inventoryCountId})}" class="btn btn-sm btn-info">View</a></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
