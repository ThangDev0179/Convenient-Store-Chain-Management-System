<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách Phiếu Kiểm Kê</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex align-items-center">
            <a href="/" class="btn btn-outline-secondary me-3" title="Quay lại Dashboard">
                <i class="bi bi-arrow-left"></i> Quay lại
            </a>
            <h2 class="mb-0"><i class="bi bi-clipboard2-check text-primary me-2"></i>Phiếu Kiểm Kê Kho</h2>
        </div>
        <a href="/inventory-count/create" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i> Tạo phiếu kiểm kê
        </a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" th:text="${successMessage}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" th:text="${errorMessage}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <table class="table table-hover table-bordered shadow-sm mt-3">
        <thead>
            <tr>
                <th>ID</th>
                <th>Code</th>
                <th>Branch</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="count : ${counts}">
                <td th:text="${count.inventoryCountId}"></td>
                <td th:text="${count.countCode}"></td>
                <td th:text="${count.branch.branchId}"></td>
                <td th:text="${count.status}"></td>
                <td><a th:href="@{/inventory-count/{id}(id=${count.inventoryCountId})}" class="btn btn-sm btn-info">View</a></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
