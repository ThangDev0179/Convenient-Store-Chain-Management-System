<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Kiểm Kê')}"></head>
<body>
<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar('inventory-count')}"></nav>
    <div th:replace="~{fragments/layout :: overlay}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Kiểm Kê')}"></div>
        <div class="page-content">

            <div class="dashboard-header d-flex justify-content-between align-items-center mb-4">
                <h2 class="page-heading"><i class="fa-solid fa-clipboard-list me-2"></i> Inventory Counts (Kiểm Kê)</h2>
                <a href="/inventory-count/create" class="btn btn-primary">
                    <i class="fa-solid fa-plus-circle me-1"></i> Create New Count
                </a>
            </div>

            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card-glass">
                <div class="table-responsive">
                    <table class="table-glass w-100 mb-0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Code</th>
                                <th>Branch</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(counts)}">
                                <td colspan="5" class="text-center text-muted py-4">Chưa có phiếu kiểm kê nào</td>
                            </tr>
                            <tr th:each="count : ${counts}">
                                <td th:text="${count.inventoryCountId}"></td>
                                <td th:text="${count.countCode}"></td>
                                <td th:text="${count.branch.branchId}"></td>
                                <td>
                                    <span th:class="${'badge-status ' + 
                                        (count.status.name() == 'Draft' ? 'status-secondary' : 
                                        (count.status.name() == 'Submitted' ? 'status-warning' : 
                                        (count.status.name() == 'Approved' ? 'status-success' : 'status-danger')))}"
                                          th:text="${count.status}"></span>
                                </td>
                                <td><a th:href="@{/inventory-count/{id}(id=${count.inventoryCountId})}" class="btn btn-sm btn-info"><i class="fa-solid fa-eye"></i> View</a></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
