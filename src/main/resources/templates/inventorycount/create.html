<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Tạo Kiểm Kê')}"></head>
<body>
<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar('inventory-count')}"></nav>
    <div th:replace="~{fragments/layout :: overlay}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Tạo Kiểm Kê')}"></div>
        <div class="page-content">

            <div class="dashboard-header mb-4">
                <h2 class="page-heading"><i class="fa-solid fa-plus-circle me-2"></i> Create Draft Inventory Count</h2>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="card-glass p-4" style="max-width: 600px;">
                <form th:action="@{/inventory-count/create}" th:object="${request}" method="post">
                    <div class="mb-4">
                        <label class="form-label text-secondary small text-uppercase">Branch ID</label>
                        <input type="number" th:field="*{branchId}" class="form-control" required/>
                    </div>
                    <!-- Detail fields would go here, simplified for stubbing -->
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save me-1"></i> Save Draft</button>
                        <a href="/inventory-count" class="btn btn-secondary">Hủy</a>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
