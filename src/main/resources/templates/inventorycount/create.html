<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Inventory Count</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Create Draft Inventory Count</h2>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    <form th:action="@{/inventory-count/create}" th:object="${request}" method="post">
        <div class="mb-3">
            <label>Branch ID</label>
            <input type="number" th:field="*{branchId}" class="form-control" required/>
        </div>
        <!-- Detail fields would go here, simplified for stubbing -->
        <button type="submit" class="btn btn-primary">Save Draft</button>
    </form>
</div>
</body>
</html>
