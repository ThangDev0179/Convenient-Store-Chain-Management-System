<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard - Hệ thống bán lẻ</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div>
                <h1 class="h3 mb-0 font-weight-bold" style="background: linear-gradient(to right, #10b981, #059669); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    MANAGER DASHBOARD
                </h1>
                <small class="text-muted">Quản lý chi nhánh cửa hàng tiện lợi</small>
            </div>
            <div>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-secondary">Đăng xuất</button>
                </form>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12">
                <div th:if="${employee != null}" class="dashboard-user-info">
                    <div class="info-item">
                        <span class="info-label">Mã nhân viên:</span>
                        <span class="info-value" th:text="${employee.employeeCode}">EMP002</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Tên đăng nhập:</span>
                        <span class="info-value" th:text="${employee.username}">manager</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Họ và tên:</span>
                        <span class="info-value" th:text="${employee.fullName}">Nguyễn Văn Manager</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Vai trò:</span>
                        <span>
                            <span class="badge-role" style="background: rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.4); color: #a7f3d0;" th:text="${employee.role.roleName}">Store Manager</span>
                        </span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Chi nhánh quản lý:</span>
                        <span class="info-value" th:text="${employee.branch != null ? employee.branch.branchName : 'Chưa phân công'}">Chi nhánh Quận 1</span>
                    </div>
                </div>

                <div class="mt-4 text-center d-flex gap-3 justify-content-center">
                    <a th:href="@{/change-password}" class="btn btn-secondary px-4">Thay đổi mật khẩu</a>
                    <button class="btn btn-primary px-4" style="width: auto; background: linear-gradient(90deg, #10b981 0%, #059669 100%); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);">Quản lý nhân sự & doanh thu</button>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
