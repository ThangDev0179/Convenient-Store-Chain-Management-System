<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Lịch Sử Phiếu Chi')}"></head>
<body>
<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar('payments')}"></nav>
    <div th:replace="~{fragments/layout :: overlay}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Lịch Sử Phiếu Chi')}"></div>
        <div class="page-content">
            <!-- Header -->
            <div class="dashboard-header d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h3 mb-0 font-weight-bold page-heading">LỊCH SỬ PHIẾU CHI THANH TOÁN (AP)</h1>
                    <small class="text-muted">Danh sách các giao dịch thanh toán công nợ cho nhà cung cấp</small>
                </div>
                <div>
                    <a th:href="@{/manager/invoices}" class="btn btn-secondary px-4 py-2">
                        <i class="fa-solid fa-arrow-left"></i> Quay Lại Hóa Đơn
                    </a>
                </div>
            </div>

            <!-- Filter & Search Section -->
            <div class="filter-bar mb-4">
                <form th:action="@{/manager/payments}" method="get" class="row g-3">
                    <div class="col-md-9">
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-muted"><i class="fa-solid fa-magnifying-glass"></i></span>
                            <input type="text" name="keyword" class="form-control" placeholder="Tìm theo mã GRN, tên nhà cung cấp hoặc phương thức thanh toán..." th:value="${keyword}">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-primary w-100 py-2">Tìm kiếm</button>
                    </div>
                </form>
            </div>

            <!-- Table Card -->
            <div class="card-glass">
                <div class="table-responsive">
                    <table class="table-glass align-middle mb-0">
                        <thead>
                            <tr>
                                <th>Mã Phiếu Chi</th>
                                <th>Mã Hóa Đơn</th>
                                <th>Mã Phiếu Nhập GRN</th>
                                <th>Nhà Cung Cấp</th>
                                <th>Ngày Chi</th>
                                <th>Người Chi</th>
                                <th>Phương Thức</th>
                                <th class="text-end">Số Tiền Đã Chi</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${paymentPage.content}">
                                <td class="font-weight-bold text-light" th:text="'PAY-' + ${p.supplierPaymentId}"></td>
                                <td>
                                    <a th:href="@{/manager/invoices/{id}(id=${p.supplierInvoiceId})}" 
                                       class="text-indigo" th:text="'INV-' + ${p.supplierInvoiceId}" style="text-decoration:none; font-weight:500;"></a>
                                </td>
                                <td th:text="${p.grnCode}"></td>
                                <td th:text="${p.supplierName}"></td>
                                <td th:text="${#temporals.format(p.paidAt, 'dd/MM/yyyy HH:mm')}"></td>
                                <td th:text="${p.paidByName}"></td>
                                <td>
                                    <span class="badge bg-secondary px-3 py-2" th:text="${p.paymentMethod}"></span>
                                </td>
                                <td class="text-end text-success font-weight-bold" 
                                    th:text="${#numbers.formatDecimal(p.amountPaid, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(paymentPage.content)}">
                                <td colspan="8" class="text-center text-muted py-4">Không tìm thấy giao dịch chi tiền nào phù hợp.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination Control -->
                <nav th:if="${paymentPage.totalPages > 1}" class="d-flex justify-content-center mt-4">
                    <ul class="pagination">
                        <li class="page-item" th:classappend="${paymentPage.first} ? 'disabled'">
                            <a class="page-link" th:href="@{/manager/payments(page=${paymentPage.number - 1}, keyword=${keyword})}">&laquo;</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, paymentPage.totalPages - 1)}" th:classappend="${i == paymentPage.number} ? 'active'">
                            <a class="page-link" th:href="@{/manager/payments(page=${i}, keyword=${keyword})}" th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${paymentPage.last} ? 'disabled'">
                            <a class="page-link" th:href="@{/manager/payments(page=${paymentPage.number + 1}, keyword=${keyword})}">&raquo;</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
