<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Chi Tiết GRN')}"></head>
<body>
<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar('grn')}"></nav>
    <div th:replace="~{fragments/layout :: overlay}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Chi Tiết GRN')}"></div>
        <div class="page-content">
            <!-- Header -->
            <div class="dashboard-header mb-4 d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="h3 mb-0 font-weight-bold page-heading">PHIẾU NHẬP KHO THỰC TẾ: <span th:text="${grn.grnCode}"></span></h1>
                    <small class="text-muted">Xem chi tiết biên bản bàn giao và tiếp nhận hàng hóa từ đối tác</small>
                </div>
                <div class="d-flex gap-3">
                    <a th:href="@{/manager/grn}" class="btn btn-secondary px-4 py-2">
                        <i class="fa-solid fa-arrow-left"></i> Quay Lại
                    </a>
                </div>
            </div>

            <!-- Notification Alerts -->
            <div th:if="${success}" class="alert alert-success text-center" th:text="${success}"></div>

            <!-- Metadata Section -->
            <div class="card-glass mb-4">
                <div class="row g-4">
                    <div class="col-md-3">
                        <div class="info-label text-secondary small text-uppercase mb-1">Mã Phiếu Nhập</div>
                        <div class="info-value text-indigo font-weight-bold" th:text="${grn.grnCode}"></div>
                    </div>
                    <div class="col-md-3">
                        <div class="info-label text-secondary small text-uppercase mb-1">Nhập Cho Đơn Hàng PO</div>
                        <div class="info-value">
                            <a th:href="@{/manager/purchase-orders/{id}(id=${grn.purchaseOrderId})}" 
                               class="text-indigo" th:text="${grn.purchaseOrderCode}" style="text-decoration:none;"></a>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="info-label text-secondary small text-uppercase mb-1">Ngày Tiếp Nhận</div>
                        <div class="info-value text-light" th:text="${#temporals.format(grn.receivedAt, 'dd/MM/yyyy HH:mm')}"></div>
                    </div>
                    <div class="col-md-3">
                        <div class="info-label text-secondary small text-uppercase mb-1">Người Tiếp Nhận</div>
                        <div class="info-value" th:text="${grn.receivedByName}"></div>
                    </div>
                    <div class="col-md-3">
                        <div class="info-label text-secondary small text-uppercase mb-1">Chi Nhánh Nhận</div>
                        <div class="info-value" th:text="${grn.branchName}"></div>
                    </div>
                    <div class="col-md-3">
                        <div class="info-label text-secondary small text-uppercase mb-1">Trạng Thái Phiếu</div>
                        <div>
                            <span th:if="${grn.status == 'Completed'}" class="badge-status status-Completed">
                                <i class="fa-solid fa-circle-check"></i> Đã Hoàn Thành
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Detail Table -->
            <div class="card-glass">
                <h3 class="h5 mb-4 font-weight-bold text-secondary text-uppercase" style="letter-spacing:1px;">Danh Mục Sản Phẩm Đã Nhập Kho</h3>
                <div class="table-responsive">
                    <table class="table-glass align-middle mb-0">
                        <thead>
                            <tr>
                                <th>Sản Phẩm</th>
                                <th style="width: 180px;">Đơn Vị Quy Đổi</th>
                                <th style="width: 220px;" class="text-end">Số Lượng Thực Nhận</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="detail : ${grn.details}">
                                <td>
                                    <span class="text-light font-weight-bold" th:text="${detail.productName}"></span>
                                    <br>
                                    <small class="text-muted" th:text="'SKU: ' + ${detail.productSku}"></small>
                                </td>
                                <td th:text="${detail.uomName}"></td>
                                <td class="text-end text-light font-weight-bold" 
                                    th:text="${#numbers.formatDecimal(detail.quantityReceived, 0, 'COMMA', 0, 'POINT')}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
