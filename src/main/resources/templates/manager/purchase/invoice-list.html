<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Hóa Đơn Nhà Cung Cấp')}"></head>
<body>
<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar('invoices')}"></nav>
    <div th:replace="~{fragments/layout :: overlay}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Hóa Đơn Nhà Cung Cấp')}"></div>
        <div class="page-content">
            <!-- Header -->
            <div class="dashboard-header mb-4 d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="h3 mb-0 font-weight-bold page-heading">HÓA ĐƠN MUA HÀNG (NCC)</h1>
                    <small class="text-muted">Quản lý hóa đơn công nợ đối soát thanh toán với Nhà cung cấp</small>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/manager/payments}" class="btn btn-primary px-4 py-2">
                        <i class="fa-solid fa-receipt"></i> Lịch Sử Phiếu Chi
                    </a>
                    <a th:href="@{/manager/grn}" class="btn btn-secondary px-4 py-2">
                        <i class="fa-solid fa-warehouse"></i> Nhập Kho (GRN)
                    </a>
                </div>
            </div>

            <!-- Notification Alerts -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show text-center" role="alert">
                <i class="fa-solid fa-circle-check me-2"></i> <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show text-center" role="alert">
                <i class="fa-solid fa-circle-exclamation me-2"></i> <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- Filter & Search Section -->
            <div class="filter-bar mb-4">
                <form th:action="@{/manager/invoices}" method="get" class="row g-3">
                    <div class="col-md-9">
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-muted"><i class="fa-solid fa-magnifying-glass"></i></span>
                            <input type="text" name="keyword" class="form-control" placeholder="Tìm theo mã GRN, tên nhà cung cấp hoặc trạng thái..." th:value="${keyword}">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-primary w-100 py-2">Tìm kiếm</button>
                    </div>
                </form>
            </div>

            <!-- Table Card -->
            <div class="card-glass">
                <div class="table-responsive">
                    <table class="table-glass align-middle mb-0">
                        <thead>
                            <tr>
                                <th>Mã Hóa Đơn</th>
                                <th>Mã Phiếu Nhập GRN</th>
                                <th>Nhà Cung Cấp</th>
                                <th class="text-end">Tổng Tiền Hóa Đơn</th>
                                <th class="text-end">Đã Thanh Toán</th>
                                <th class="text-center">Trạng Thái</th>
                                <th class="text-center">Hành Động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="invoice : ${invoicePage.content}">
                                <td class="font-weight-bold text-light" th:text="'INV-' + ${invoice.supplierInvoiceId}"></td>
                                <td>
                                    <a th:href="@{/manager/grn/{id}(id=${invoice.grnId})}" 
                                       class="text-indigo" th:text="${invoice.grnCode}" style="text-decoration:none; font-weight:500;"></a>
                                </td>
                                <td th:text="${invoice.supplierName}"></td>
                                <td class="text-end text-light font-weight-bold" 
                                    th:text="${#numbers.formatDecimal(invoice.amount, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
                                <td class="text-end text-success font-weight-bold" 
                                    th:text="${#numbers.formatDecimal(invoice.amountPaid, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
                                <td class="text-center">
                                    <span th:if="${invoice.status == 'Draft'}" class="badge-status status-Draft">
                                        <i class="fa-solid fa-file-lines"></i> Nháp
                                    </span>
                                    <span th:if="${invoice.status == 'Approved'}" class="badge-status status-Approved">
                                        <i class="fa-solid fa-thumbs-up"></i> Đã Duyệt
                                    </span>
                                    <span th:if="${invoice.status == 'Unpaid'}" class="badge-status status-Unpaid">
                                        <i class="fa-solid fa-circle-exclamation"></i> Chưa Trả
                                    </span>
                                    <span th:if="${invoice.status == 'Partially_Paid'}" class="badge-status status-Partially_Paid">
                                        <i class="fa-solid fa-hourglass-half"></i> Trả Một Phần
                                    </span>
                                    <span th:if="${invoice.status == 'Paid'}" class="badge-status status-Paid">
                                        <i class="fa-solid fa-circle-check"></i> Đã Trả Hết
                                    </span>
                                </td>
                                <td class="text-center">
                                    <a th:href="@{/manager/invoices/{id}(id=${invoice.supplierInvoiceId})}" class="btn btn-sm btn-secondary">
                                        <i class="fa-solid fa-eye"></i> Chi tiết
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination Control -->
                <nav th:if="${invoicePage.totalPages > 1}" class="d-flex justify-content-center mt-4">
                    <ul class="pagination">
                        <li class="page-item" th:classappend="${invoicePage.first} ? 'disabled'">
                            <a class="page-link" th:href="@{/manager/invoices(page=${invoicePage.number - 1}, keyword=${keyword})}">&laquo;</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, invoicePage.totalPages - 1)}" th:classappend="${i == invoicePage.number} ? 'active'">
                            <a class="page-link" th:href="@{/manager/invoices(page=${i}, keyword=${keyword})}" th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${invoicePage.last} ? 'disabled'">
                            <a class="page-link" th:href="@{/manager/invoices(page=${invoicePage.number + 1}, keyword=${keyword})}">&raquo;</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
