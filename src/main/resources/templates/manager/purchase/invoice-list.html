<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa Đơn Mua Hàng (NCC) - Hệ thống bán lẻ</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .invoice-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-lg);
        }
        .table {
            color: var(--text-primary);
        }
        .table th {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        .status-badge {
            font-size: 0.8rem;
            padding: 6px 12px;
            border-radius: 50px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .status-draft { background: rgba(156, 163, 175, 0.2); color: #9ca3af; }
        .status-approved { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .status-unpaid { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .status-partial { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .status-paid { background: rgba(16, 185, 129, 0.2); color: #10b981; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <div class="dashboard-header d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 mb-0 font-weight-bold" style="background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    HÓA ĐƠN MUA HÀNG (NCC)
                </h1>
                <small class="text-muted">Quản lý hóa đơn công nợ đối soát thanh toán với Nhà cung cấp</small>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/manager/payments}" class="btn btn-indigo px-4 py-2">
                    <i class="fa-solid fa-receipt"></i> Lịch Sử Phiếu Chi
                </a>
                <a th:href="@{/manager/grn}" class="btn btn-secondary px-4 py-2">
                    <i class="fa-solid fa-warehouse"></i> Nhập Kho (GRN)
                </a>
            </div>
        </div>

        <!-- Notification Alerts -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show text-center" role="alert">
            <i class="fa-solid fa-circle-check me-2"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show text-center" role="alert">
            <i class="fa-solid fa-circle-exclamation me-2"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Filter & Search Section -->
        <div class="invoice-card mb-4">
            <form th:action="@{/manager/invoices}" method="get" class="row g-3">
                <div class="col-md-9">
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-muted"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <input type="text" name="keyword" class="form-control bg-dark border-secondary text-light" 
                               placeholder="Tìm theo mã GRN, tên nhà cung cấp hoặc trạng thái..." th:value="${keyword}">
                    </div>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100 py-2">Tìm kiếm</button>
                </div>
            </form>
        </div>

        <!-- Table Card -->
        <div class="invoice-card">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Mã Hóa Đơn</th>
                            <th>Mã Phiếu Nhập GRN</th>
                            <th>Nhà Cung Cấp</th>
                            <th class="text-end">Tổng Tiền Hóa Đơn</th>
                            <th class="text-end">Đã Thanh Toán</th>
                            <th class="text-center">Trạng Thái</th>
                            <th class="text-center">Hành Động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="invoice : ${invoicePage.content}">
                            <td class="font-weight-bold text-light" th:text="'INV-' + ${invoice.supplierInvoiceId}"></td>
                            <td>
                                <a th:href="@{/manager/grn/{id}(id=${invoice.grnId})}" 
                                   class="text-indigo" th:text="${invoice.grnCode}" style="text-decoration:none; font-weight:500;"></a>
                            </td>
                            <td th:text="${invoice.supplierName}"></td>
                            <td class="text-end text-light font-weight-bold" 
                                th:text="${#numbers.formatDecimal(invoice.amount, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
                            <td class="text-end text-success font-weight-bold" 
                                th:text="${#numbers.formatDecimal(invoice.amountPaid, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
                            <td class="text-center">
                                <span th:if="${invoice.status == 'Draft'}" class="status-badge status-draft">
                                    <i class="fa-solid fa-file-lines"></i> Nháp
                                </span>
                                <span th:if="${invoice.status == 'Approved'}" class="status-badge status-approved">
                                    <i class="fa-solid fa-thumbs-up"></i> Đã Duyệt
                                </span>
                                <span th:if="${invoice.status == 'Unpaid'}" class="status-badge status-unpaid">
                                    <i class="fa-solid fa-circle-exclamation"></i> Chưa Trả
                                </span>
                                <span th:if="${invoice.status == 'Partially_Paid'}" class="status-badge status-partial">
                                    <i class="fa-solid fa-hourglass-half"></i> Trả Một Phần
                                </span>
                                <span th:if="${invoice.status == 'Paid'}" class="status-badge status-paid">
                                    <i class="fa-solid fa-circle-check"></i> Đã Trả Hết
                                </span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/manager/invoices/{id}(id=${invoice.supplierInvoiceId})}" class="btn btn-sm btn-secondary">
                                    <i class="fa-solid fa-eye"></i> Chi tiết
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination Control -->
            <nav th:if="${invoicePage.totalPages > 1}" class="d-flex justify-content-center mt-4">
                <ul class="pagination">
                    <li class="page-item" th:classappend="${invoicePage.first} ? 'disabled'">
                        <a class="page-link bg-dark border-secondary text-light" 
                           th:href="@{/manager/invoices(page=${invoicePage.number - 1}, keyword=${keyword})}">&laquo;</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, invoicePage.totalPages - 1)}" 
                        th:classappend="${i == invoicePage.number} ? 'active'">
                        <a class="page-link bg-dark border-secondary text-light" 
                           th:href="@{/manager/invoices(page=${i}, keyword=${keyword})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${invoicePage.last} ? 'disabled'">
                        <a class="page-link bg-dark border-secondary text-light" 
                           th:href="@{/manager/invoices(page=${invoicePage.number + 1}, keyword=${keyword})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
