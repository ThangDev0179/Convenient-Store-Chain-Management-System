<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${'Đổi trả: ' + refund.refundCode()})}"></head>
<body class="bg-light">

<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar('refund')}"></nav>
    <div th:replace="~{fragments/layout :: overlay}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar(${'Đổi trả: ' + refund.refundCode()})}"></div>
        <div class="page-content">
            <div class="container py-4" style="max-width:900px">
                <div class="d-flex align-items-center mb-3">
                    <a href="/refunds" class="btn btn-outline-secondary btn-sm me-3">
                        <i class="bi bi-arrow-left"></i> Quay lại
                    </a>
                    <h4 class="mb-0" th:text="${'Đổi trả: ' + refund.refundCode()}"></h4>
                    <span class="ms-2 badge"
                          th:text="${refund.status()}"
                          th:classappend="${refund.status().name() == 'Completed' ? ' bg-success' :
                                           refund.status().name() == 'Pending_Approval' ? ' bg-warning text-dark' :
                                           refund.status().name() == 'Rejected' ? ' bg-danger' : ' bg-secondary'}">
                    </span>
                    <span th:if="${refund.pinOverrideUsed()}" class="ms-1 badge bg-info text-dark">PIN Override</span>
                </div>

                <!-- Info -->
                <div class="card shadow-sm mb-3">
                    <div class="card-header fw-semibold bg-white">Thông tin</div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <dl class="row mb-0">
                                    <dt class="col-sm-5 text-muted">Mã đổi trả</dt>
                                    <dd class="col-sm-7"><code th:text="${refund.refundCode()}"></code></dd>
                                    <dt class="col-sm-5 text-muted">HĐ gốc</dt>
                                    <dd class="col-sm-7">
                                        <a th:href="@{'/pos/invoices/' + ${refund.originalInvoiceId()}}"
                                           th:text="${refund.originalInvoiceCode()}"></a>
                                    </dd>
                                    <dt class="col-sm-5 text-muted">Khách hàng</dt>
                                    <dd class="col-sm-7" th:text="${refund.customerName()}"></dd>
                                    <dt class="col-sm-5 text-muted">SĐT</dt>
                                    <dd class="col-sm-7" th:text="${refund.customerPhone()}"></dd>
                                </dl>
                            </div>
                            <div class="col-md-6">
                                <dl class="row mb-0">
                                    <dt class="col-sm-5 text-muted">Người yêu cầu</dt>
                                    <dd class="col-sm-7" th:text="${refund.requestedByName()}"></dd>
                                    <dt class="col-sm-5 text-muted" th:if="${refund.approvedByName() != null}">Người duyệt</dt>
                                    <dd class="col-sm-7" th:if="${refund.approvedByName() != null}"
                                        th:text="${refund.approvedByName()}"></dd>
                                    <dt class="col-sm-5 text-muted">Ngày tạo</dt>
                                    <dd class="col-sm-7"
                                        th:text="${#temporals.format(refund.createdAt(), 'dd/MM/yyyy HH:mm:ss')}"></dd>
                                    <dt class="col-sm-5 text-muted" th:if="${refund.approvedAt() != null}">Ngày duyệt</dt>
                                    <dd class="col-sm-7" th:if="${refund.approvedAt() != null}"
                                        th:text="${#temporals.format(refund.approvedAt(), 'dd/MM/yyyy HH:mm:ss')}"></dd>
                                </dl>
                            </div>
                            <div class="col-12 mt-2">
                                <strong class="text-muted">Lý do:</strong>
                                <p th:text="${refund.reason()}" class="mb-0 text-body"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Items -->
                <div class="card shadow-sm mb-3">
                    <div class="card-header fw-semibold bg-white">Sản phẩm đổi trả</div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th>SKU</th>
                                    <th>Tên sản phẩm</th>
                                    <th class="text-end">Số lượng</th>
                                    <th class="text-center">Tình trạng</th>
                                    <th class="text-end">Đơn giá hoàn</th>
                                    <th class="text-end">Thành tiền</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item, iStat : ${refund.items()}">
                                    <td th:text="${iStat.index + 1}"></td>
                                    <td><small class="text-muted" th:text="${item.sku()}"></small></td>
                                    <td th:text="${item.productName()}"></td>
                                    <td class="text-end" th:text="${item.quantity()}"></td>
                                    <td class="text-center">
                                        <span th:if="${item.conditionType().name() == 'Resalable'}" class="badge bg-success">Tốt (Resalable)</span>
                                        <span th:if="${item.conditionType().name() == 'Damaged'}" class="badge bg-warning text-dark">Hỏng (Damaged)</span>
                                    </td>
                                    <td class="text-end"
                                        th:text="${#numbers.formatDecimal(item.unitRefundAmount(), 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                                    <td class="text-end fw-semibold text-danger"
                                        th:text="${#numbers.formatDecimal(item.unitRefundAmount() * item.quantity(), 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                                </tr>
                            </tbody>
                            <tfoot>
                                <tr class="table-light fw-bold">
                                    <td colspan="6" class="text-end">TỔNG HOÀN</td>
                                    <td class="text-end text-danger fs-5"
                                        th:text="${#numbers.formatDecimal(refund.totalRefundAmount(), 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>

                <!-- Actions: Manager/Admin only -->
                <div th:if="${isManagerOrAdmin}" class="d-flex gap-2">
                    <button th:if="${refund.status().name() == 'Pending_Approval' or refund.status().name() == 'Draft'}"
                            class="btn btn-success"
                            th:onclick="|approveRefund(${refund.refundId()})|">
                        <i class="bi bi-check2-circle"></i> Phê duyệt
                    </button>
                    <button th:if="${refund.status().name() == 'Pending_Approval' or refund.status().name() == 'Draft'}"
                            class="btn btn-danger"
                            th:onclick="|rejectRefund(${refund.refundId()})|">
                        <i class="bi bi-x-circle"></i> Từ chối
                    </button>

                    <!-- PIN Override section -->
                    <button th:if="${refund.status().name() == 'Pending_Approval' or refund.status().name() == 'Draft'}"
                            class="btn btn-outline-warning"
                            data-bs-toggle="collapse" data-bs-target="#pin-override-section">
                        <i class="bi bi-shield-lock"></i> Duyệt qua PIN
                    </button>
                </div>

                <!-- PIN Override form -->
                <div id="pin-override-section" class="collapse mt-3" th:if="${isManagerOrAdmin}">
                    <div class="card border-warning shadow-sm">
                        <div class="card-header bg-warning text-dark fw-semibold">
                            <i class="bi bi-shield-lock-fill"></i> Manager PIN Override
                        </div>
                        <div class="card-body">
                            <div id="pin-alert"></div>
                            <div class="row g-2">
                                <div class="col-md-4">
                                    <label class="form-label form-label-sm">Tên đăng nhập Manager</label>
                                    <input type="text" id="manager-username" class="form-control form-control-sm">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label form-label-sm">Mật khẩu / PIN</label>
                                    <input type="password" id="manager-pin" class="form-control form-control-sm">
                                </div>
                                <div class="col-md-4 d-flex align-items-end">
                                    <button class="btn btn-warning btn-sm w-100"
                                            th:onclick="|overrideApprove(${refund.refundId()})|">
                                        <i class="bi bi-unlock-fill"></i> Xác nhận duyệt ngay
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function approveRefund(id) {
    if (!confirm('Phê duyệt yêu cầu đổi trả này?')) return;
    const res = await fetch(`/refunds/${id}/approve`, { method: 'PUT', headers: { 'Accept': 'application/json' } });
    const data = await res.json();
    if (res.ok) { alert('Đã phê duyệt: ' + data.refundCode); location.reload(); }
    else alert('Lỗi: ' + (data.message || 'Không thể phê duyệt'));
}
async function rejectRefund(id) {
    const reason = prompt('Lý do từ chối:');
    if (reason === null) return;
    const res = await fetch(`/refunds/${id}/reject`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ reason: reason })
    });
    const data = await res.json();
    if (res.ok) { alert('Đã từ chối.'); location.reload(); }
    else alert('Lỗi: ' + (data.message || 'Không thể từ chối'));
}
async function overrideApprove(id) {
    const username = document.getElementById('manager-username').value.trim();
    const pin = document.getElementById('manager-pin').value.trim();
    if (!username || !pin) { alert('Nhập đủ tên đăng nhập và mật khẩu'); return; }
    const res = await fetch(`/refunds/${id}/override-approve`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ managerUsername: username, managerPin: pin })
    });
    const data = await res.json();
    if (res.ok) { alert('Đã duyệt ngay qua PIN! ' + data.refundCode); location.reload(); }
    else {
        document.getElementById('pin-alert').innerHTML =
            `<div class="alert alert-danger">${data.message || 'PIN không hợp lệ'}</div>`;
    }
}
</script>
</body>
</html>
