<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Tạo yêu cầu đổi trả')}"></head>
<body class="bg-light">

<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar('refund')}"></nav>
    <div th:replace="~{fragments/layout :: overlay}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Tạo yêu cầu đổi trả')}"></div>
        <div class="page-content">
            <div class="container py-4" style="max-width:900px">
                <div class="d-flex align-items-center mb-3">
                    <a href="/refunds" class="btn btn-outline-secondary btn-sm me-3">
                        <i class="bi bi-arrow-left"></i> Quay lại
                    </a>
                    <h4 class="mb-0"><i class="bi bi-arrow-return-left text-warning"></i> Tạo yêu cầu đổi trả</h4>
                </div>

                <!-- Error / success alerts -->
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Step 1: Search invoice -->
                <div class="card shadow-sm mb-3" id="invoice-search-card">
                    <div class="card-header fw-semibold bg-white">Bước 1: Tìm hóa đơn gốc</div>
                    <div class="card-body">
                        <div class="input-group">
                            <input type="text" id="invoice-code-input" class="form-control"
                                   placeholder="Nhập mã hóa đơn (VD: INV-HN01-20240101-000001)"
                                   th:value="${invoiceCode}">
                            <button class="btn btn-primary" id="btn-load-invoice">
                                <i class="bi bi-search"></i> Tải hóa đơn
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Step 2: Refund form (hidden until invoice loaded) -->
                <div id="refund-form-section" style="display:none">
                    <div class="card shadow-sm mb-3">
                        <div class="card-header fw-semibold bg-white">Hóa đơn gốc</div>
                        <div class="card-body">
                            <div id="invoice-info" class="row g-2 mb-3"></div>
                        </div>
                    </div>

                    <form method="post" action="/refunds" id="refund-form" th:object="${createRefundRequest}">
                        <input type="hidden" name="_method" value="post">
                        <input type="hidden" name="originalInvoiceId" id="hidden-invoice-id">

                        <!-- Customer info -->
                        <div class="card shadow-sm mb-3">
                            <div class="card-header fw-semibold bg-white">Thông tin khách hàng</div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Tên khách hàng <span class="text-danger">*</span></label>
                                        <input type="text" name="customerName" class="form-control"
                                               th:value="${param.customerName}" required
                                               th:classappend="${#fields.hasErrors('customerName') ? ' is-invalid' : ''}">
                                        <div class="invalid-feedback" th:errors="*{customerName}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                                        <input type="tel" name="customerPhone" class="form-control"
                                               th:value="${param.customerPhone}" required
                                               pattern="^(0|\+84)[0-9]{9,10}$"
                                               th:classappend="${#fields.hasErrors('customerPhone') ? ' is-invalid' : ''}">
                                        <div class="invalid-feedback" th:errors="*{customerPhone}">
                                            Số điện thoại không hợp lệ (VD: 0912345678)
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label">Lý do đổi trả <span class="text-danger">*</span></label>
                                        <textarea name="reason" class="form-control" rows="2" required maxlength="500"
                                                  th:classappend="${#fields.hasErrors('reason') ? ' is-invalid' : ''}"
                                                  th:text="${param.reason}"></textarea>
                                        <div class="invalid-feedback" th:errors="*{reason}"></div>
                                        <div class="form-text">Tối đa 500 ký tự</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Items -->
                        <div class="card shadow-sm mb-3">
                            <div class="card-header fw-semibold bg-white">Sản phẩm đổi trả</div>
                            <div class="table-responsive">
                                <table class="table table-hover mb-0" id="refund-items-table">
                                    <thead class="table-light">
                                        <tr>
                                            <th><input type="checkbox" id="check-all"></th>
                                            <th>SKU</th>
                                            <th>Tên sản phẩm</th>
                                            <th class="text-end">Đã mua</th>
                                            <th class="text-end">Còn được trả</th>
                                            <th class="text-end">Đơn giá</th>
                                            <th class="text-center" style="width:100px">SL trả</th>
                                            <th class="text-center">Tình trạng</th>
                                        </tr>
                                    </thead>
                                    <tbody id="refund-items-body">
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning btn-lg">
                                <i class="bi bi-check2-circle"></i> Tạo yêu cầu đổi trả
                            </button>
                            <a href="/refunds" class="btn btn-outline-secondary btn-lg">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
/*<![CDATA[*/
const conditionTypes = /*[[${conditionTypes}]]*/ ['Resalable','Damaged'];

// Auto-load if invoiceCode or invoiceId pre-filled
window.addEventListener('DOMContentLoaded', () => {
    const code = document.getElementById('invoice-code-input').value.trim();
    if (code) {
        loadInvoice(code);
    }
    const urlInvoiceId = new URLSearchParams(window.location.search).get('invoiceId');
    if (urlInvoiceId) {
        loadInvoiceById(urlInvoiceId);
    }
});

document.getElementById('btn-load-invoice').addEventListener('click', () => {
    loadInvoice(document.getElementById('invoice-code-input').value.trim());
});

let invoiceData = null;

async function loadInvoice(code) {
    if (!code) return;
    const res = await fetch(`/pos/invoices/by-invoice-code?invoiceCode=${encodeURIComponent(code)}`, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) {
        alert('Không tìm thấy hóa đơn có mã: ' + code);
        return;
    }
    invoiceData = await res.json();

    if (invoiceData.status !== 'Paid') {
        alert('Hóa đơn chưa được thanh toán (Trạng thái: ' + invoiceData.status + '). Chỉ có thể đổi trả hóa đơn đã thanh toán.');
        return;
    }

    document.getElementById('hidden-invoice-id').value = invoiceData.invoiceId;
    document.getElementById('refund-form-section').style.display = '';

    // Show invoice info
    document.getElementById('invoice-info').innerHTML = `
        <div class="col-md-4"><strong>Mã HĐ:</strong> <code>${invoiceData.invoiceCode}</code></div>
        <div class="col-md-4"><strong>Ngày bán:</strong> ${new Date(invoiceData.createdAt).toLocaleDateString('vi-VN')}</div>
        <div class="col-md-4"><strong>Tổng tiền:</strong> <span class="text-primary fw-bold">${fmt(invoiceData.totalAmount)}</span></div>`;

    renderRefundItems(invoiceData.items);
}

// Load via URL parameter (invoiceId) — preferred flow from invoice-detail link
async function loadInvoiceById(invoiceId) {
    const res = await fetch(`/pos/invoices/${invoiceId}`, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) { alert('Không tìm thấy hóa đơn'); return; }
    invoiceData = await res.json();

    document.getElementById('hidden-invoice-id').value = invoiceData.invoiceId;
    document.getElementById('refund-form-section').style.display = '';

    // Show invoice info
    document.getElementById('invoice-info').innerHTML = `
        <div class="col-md-4"><strong>Mã HĐ:</strong> <code>${invoiceData.invoiceCode}</code></div>
        <div class="col-md-4"><strong>Ngày bán:</strong> ${new Date(invoiceData.createdAt).toLocaleDateString('vi-VN')}</div>
        <div class="col-md-4"><strong>Tổng tiền:</strong> <span class="text-primary fw-bold">${fmt(invoiceData.totalAmount)}</span></div>`;

    renderRefundItems(invoiceData.items);
}

function renderRefundItems(items) {
    const tbody = document.getElementById('refund-items-body');
    tbody.innerHTML = items.map((item, idx) => `
        <tr>
            <td><input type="checkbox" class="item-check" data-idx="${idx}" onchange="toggleItem(${idx})"></td>
            <td><small class="text-muted">${item.sku}</small></td>
            <td>${item.productName}</td>
            <td class="text-end">${item.quantity}</td>
            <td class="text-end text-success fw-semibold" id="remain-${idx}">${item.quantity}</td>
            <td class="text-end">${fmt(item.unitPrice)}</td>
            <td class="text-center">
                <input type="number" name="items[${idx}].quantity" class="form-control form-control-sm text-center"
                       value="1" min="0.001" max="${item.quantity}" step="0.001"
                       style="width:80px;display:none" id="qty-${idx}">
                <input type="hidden" name="items[${idx}].productId" value="${item.productId}">
            </td>
            <td class="text-center">
                <select name="items[${idx}].conditionType" class="form-select form-select-sm"
                        style="width:110px;display:none" id="cond-${idx}">
                    ${conditionTypes.map(c => `<option value="${c}">${c === 'Resalable' ? 'Tốt' : 'Hỏng'}</option>`).join('')}
                </select>
            </td>
        </tr>`).join('');
}

function toggleItem(idx) {
    const checked = document.querySelector(`.item-check[data-idx="${idx}"]`).checked;
    document.getElementById(`qty-${idx}`).style.display = checked ? '' : 'none';
    document.getElementById(`cond-${idx}`).style.display = checked ? '' : 'none';
}

document.getElementById('check-all').addEventListener('change', function() {
    document.querySelectorAll('.item-check').forEach((cb, idx) => {
        cb.checked = this.checked;
        toggleItem(idx);
    });
});

function fmt(v) {
    return new Intl.NumberFormat('vi-VN', {style:'currency', currency:'VND'}).format(v);
}

// If loaded from invoice-detail link with invoiceCode param
const urlCode = new URLSearchParams(window.location.search).get('invoiceCode');
if (urlCode) {
    document.getElementById('invoice-code-input').value = urlCode;
}
/*]]>*/
</script>
</body>
</html>
