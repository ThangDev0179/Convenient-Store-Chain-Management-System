<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quên mật khẩu - Hệ thống quản lý chuỗi cửa hàng tiện lợi')}"></head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Quên mật khẩu</h1>
                <p class="auth-subtitle">Nhập email đăng ký của bạn để lấy lại mật khẩu</p>
            </div>

            <!-- Error Notification -->
            <div th:if="${error}" class="alert alert-danger text-center" role="alert">
                <span th:text="${error}">Email không hợp lệ</span>
            </div>

            <!-- Success Notification -->
            <div th:if="${success}" class="alert alert-success text-center" role="alert">
                <span th:text="${success}">Link đặt lại mật khẩu đã được gửi</span>
            </div>

            <form th:action="@{/forgot-password}" th:object="${forgotPasswordRequest}" method="post">
                <div class="mb-4">
                    <label for="email" class="form-label">Email hệ thống</label>
                    <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="example@retail.com">
                </div>

                <button type="submit" class="btn btn-primary">Gửi yêu cầu</button>
            </form>

            <div class="auth-footer">
                <a th:href="@{/login}">Quay lại đăng nhập</a>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
