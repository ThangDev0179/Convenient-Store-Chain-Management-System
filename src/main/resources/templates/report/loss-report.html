<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Báo Cáo Tổn Thất</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-graph-down-arrow text-danger me-2"></i>Báo Cáo Hao Hụt & Tổn Thất</h2>
        <a href="/report/dashboard" class="btn btn-outline-secondary">
            <i class="bi bi-speedometer2 me-1"></i> Dashboard
        </a>
    </div>

    <!-- Lọc -->
    <div class="card mb-3 shadow-sm">
        <div class="card-body bg-light">
            <form th:action="@{/report/loss}" method="get" class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label">Từ ngày</label>
                    <input type="date" name="startDate" class="form-control" th:value="${startDate}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Đến ngày</label>
                    <input type="date" name="endDate" class="form-control" th:value="${endDate}">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-funnel me-1"></i>Lọc</button>
                </div>
                <div class="col-md-2">
                    <a href="/report/loss" class="btn btn-outline-secondary w-100">Xóa bộ lọc</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Bảng -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-danger">
                    <tr>
                        <th>Chi nhánh</th>
                        <th>Nguồn Hao Hụt</th>
                        <th class="text-end">Tổng SL Hủy/Mất</th>
                        <th class="text-end">Giá Trị Tổn Thất (VNĐ)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(report)}">
                        <td colspan="4" class="text-center py-4 text-muted">Không phát sinh hao hụt trong kỳ</td>
                    </tr>
                    <tr th:each="r : ${report}">
                        <td class="fw-bold" th:text="${r.branchName + ' (' + r.branchId + ')'}"></td>
                        <td>
                            <span th:class="${'badge ' + 
                                (r.sourceType.name() == 'Manual' ? 'bg-primary' : 
                                (r.sourceType.name() == 'TransferLoss' ? 'bg-warning text-dark' : 'bg-info text-dark'))}"
                                  th:text="${r.sourceType}">
                            </span>
                        </td>
                        <td class="text-end" th:text="${#numbers.formatDecimal(r.totalDisposedQty, 0, 'COMMA', 3, 'POINT')}"></td>
                        <td class="text-end text-danger fw-bold" th:text="${#numbers.formatDecimal(r.totalLossValue, 0, 'COMMA', 0, 'POINT')}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
