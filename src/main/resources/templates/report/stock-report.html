<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Báo Cáo Tồn Kho')}"></head>
<body>
<div class="app-layout">
    <nav th:replace="~{fragments/layout :: sidebar('manager-dashboard')}"></nav>
    <div th:replace="~{fragments/layout :: overlay}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Báo Cáo Tồn Kho')}"></div>
        <div class="page-content">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="fa-solid fa-box-seam me-2"></i>Báo Cáo Giá Trị Tồn Kho</h2>
                <a href="/report/dashboard" class="btn btn-secondary">
                    <i class="fa-solid fa-gauge-high me-1"></i> Dashboard
                </a>
            </div>

            <!-- Lọc -->
            <div class="card-glass mb-4 shadow-sm">
                <div class="card-body-glass">
                    <form th:action="@{/report/stock}" method="get" class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label text-light">Chi nhánh (Branch ID)</label>
                            <input type="number" name="branchId" class="form-control" placeholder="Để trống để xem toàn hệ thống" th:value="${selectedBranchId}">
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100"><i class="fa-solid fa-filter me-1"></i>Lọc</button>
                        </div>
                        <div class="col-md-2">
                            <a href="/report/stock" class="btn btn-outline-secondary w-100 text-light">Xóa bộ lọc</a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Bảng -->
            <div class="card-glass shadow-sm">
                <div class="card-body-glass p-0">
                    <table class="table-glass w-100 mb-0">
                        <thead>
                            <tr>
                                <th>Chi nhánh</th>
                                <th class="text-end">Tổng Qty On Hand</th>
                                <th class="text-end">Tổng Qty Available</th>
                                <th class="text-end">Tổng Giá trị (VNĐ)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(report)}">
                                <td colspan="4" class="text-center py-4 text-muted">Không có dữ liệu</td>
                            </tr>
                            <tr th:each="r : ${report}">
                                <td class="fw-bold" th:text="${r.branchName + ' (' + r.branchId + ')'}"></td>
                                <td class="text-end" th:text="${#numbers.formatDecimal(r.totalQtyOnHand, 0, 'COMMA', 0, 'POINT')}"></td>
                                <td class="text-end" th:text="${#numbers.formatDecimal(r.totalQtyAvailable, 0, 'COMMA', 0, 'POINT')}"></td>
                                <td class="text-end text-primary fw-bold" th:text="${#numbers.formatDecimal(r.totalValue, 0, 'COMMA', 0, 'POINT')}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
